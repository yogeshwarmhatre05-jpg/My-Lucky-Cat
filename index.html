<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;

  display:flex;
  flex-direction:column;
  align-items:center;

  padding:18px 0 40px;

  font-family:'Poppins',sans-serif;

  background:
  linear-gradient(
    to bottom,
    #fffffd,
    #fdffe8,
    #f7ffd2,
    #f1ffc2
  );

  color:#374151;

  position:relative;
}

/* RGB BODY BORDER */

.rgb-border{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
}

.rgb-border::before{
  content:"";
  position:absolute;
  inset:0;

  border:3px solid transparent;

  border-image:
  linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d
  ) 1;

  animation:rgbMove 3s linear infinite;
}

@keyframes rgbMove{

  0%{
    filter:hue-rotate(0deg);
  }

  100%{
    filter:hue-rotate(360deg);
  }

}

/* WELCOME */

.welcome-top{

  margin-top:6px;

  font-size:28px;

  font-family:'Orbitron',sans-serif;

  font-weight:900;

  letter-spacing:3px;

  text-align:center;

  padding:12px 20px;

  border-radius:18px;

  color:#475569;

  background:rgba(255,255,255,0.7);

  border:2px solid #d9f99d;
}

/* OWNER */

.owner-box{

  margin-top:14px;

  text-align:center;

  padding:12px 20px;

  border-radius:18px;

  background:rgba(255,255,255,0.7);

  border:2px solid #d9f99d;
}

.owner-title{

  font-size:12px;

  font-weight:700;

  letter-spacing:4px;

  color:#6b7280;

  margin-bottom:6px;
}

.owner-name{

  font-size:24px;

  font-family:'Orbitron',sans-serif;

  font-weight:900;

  letter-spacing:2px;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

/* WRAPPER */

.wrapper{

  width:100%;

  max-width:300px;

  display:flex;

  flex-direction:column;

  gap:18px;

  margin-top:22px;
}

/* CARDS */

.music-player,
.calendar,
.nav-box{

  width:100%;

  background:
  rgba(255,255,255,0.7);

  border-radius:24px;

  padding:12px;

  border:2px solid #d9f99d;
}

/* PLAYER */

.song{

  text-align:center;

  margin-bottom:10px;

  font-size:11px;

  font-weight:700;

  color:#4b5563;
}

.screen{

  width:100%;

  aspect-ratio:16/9;

  border-radius:16px;

  overflow:hidden;

  background:black;
}

iframe{

  width:100%;

  height:100%;

  border:none;
}

.controls{

  display:flex;

  justify-content:center;

  margin-top:10px;
}

/* THEME BUTTONS */

.controls button,
.nav a{

  background:
  rgba(255,255,255,0.75);

  border:2px solid #d9f99d;

  color:#475569;

  font-weight:800;

  transition:0.3s;
}

/* PLAY BUTTON */

.controls button{

  width:120px;

  height:36px;

  border-radius:12px;

  cursor:pointer;

  font-size:12px;
}

/* NAV BUTTONS */

.nav a{

  display:block;

  text-align:center;

  margin:8px 0;

  padding:12px;

  border-radius:14px;

  text-decoration:none;

  font-size:12px;
}

/* HOVER */

.controls button:hover,
.nav a:hover{

  background:#f7ffd2;

}

/* CALENDAR */

.header{

  text-align:center;

  font-size:20px;

  font-weight:900;

  margin-bottom:12px;

  color:#4b5563;
}

.days,
.dates{

  display:grid;

  grid-template-columns:repeat(7,1fr);

  gap:5px;
}

.days div{

  text-align:center;

  font-size:10px;

  font-weight:800;

  color:#6b7280;
}

.dates div{

  height:30px;

  display:flex;

  justify-content:center;

  align-items:center;

  border-radius:10px;

  background:#ffffff;

  font-size:11px;

  font-weight:700;
}

.today{

  background:#d9ff8d !important;

  color:#374151 !important;
}

/* FOOTER */

.footer{

  margin-top:18px;

  font-size:20px;

  font-weight:900;

  font-family:'Orbitron',sans-serif;

  background:linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<div class="rgb-border"></div>

<div class="welcome-top">
  WELCOME TO SAPPHIRE
</div>

<div class="owner-box">

  <div class="owner-title">
    OWNER
  </div>

  <div class="owner-name">
    Rosemarie_Hales
  </div>

</div>

<div class="wrapper">

  <!-- PLAYER -->

  <div class="music-player">

    <div class="song">
      Now Playing : Golden Brown
    </div>

    <div class="screen">

      <iframe
      id="playerFrame"
      src="https://www.youtube.com/embed/kcsGhOmULxQ?enablejsapi=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
      </iframe>

    </div>

    <div class="controls">

      <button id="playBtn">
        PLAY
      </button>

    </div>

  </div>

  <!-- CALENDAR -->

  <div class="calendar">

    <div class="header" id="monthYear"></div>

    <div class="days">

      <div>SUN</div>
      <div>MON</div>
      <div>TUE</div>
      <div>WED</div>
      <div>THU</div>
      <div>FRI</div>
      <div>SAT</div>

    </div>

    <div class="dates" id="dates"></div>

  </div>

  <!-- NAV -->

  <div class="nav-box">

    <div class="nav">

      <a href="#">RULES</a>

      <a href="#">EVENTS</a>

      <a href="#">MEMBERS</a>

      <a href="#">CLICK HERE</a>

    </div>

  </div>

</div>

<div class="footer">
  Made by yogi136.Sapphire
</div>

<script>

/* VIDEO PLAYER */

const frame =
document.getElementById("playerFrame");

const playBtn =
document.getElementById("playBtn");

let playing = false;

playBtn.addEventListener("click",()=>{

  if(!playing){

    frame.contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}',
    "*"
    );

    playBtn.innerText = "PAUSE";

    playing = true;

  }else{

    frame.contentWindow.postMessage(
    '{"event":"command","func":"pauseVideo","args":""}',
    "*"
    );

    playBtn.innerText = "PLAY";

    playing = false;

  }

});

/* CALENDAR */

const monthYear =
document.getElementById("monthYear");

const dates =
document.getElementById("dates");

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const today = now.getDate();

const months = [

"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"

];

monthYear.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

  dates.innerHTML += `<div></div>`;

}

for(let i=1;i<=lastDate;i++){

  dates.innerHTML +=
  `<div class="${i===today?'today':''}">
  ${i}
  </div>`;

}

</script>

</body>
</html>
