<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  position:relative;
  transition:0.6s;

  /* 🍌 LIGHTEST BANANA (PASTEL CREAM) */
  background:linear-gradient(
    to bottom,
    #fffef7,
    #fff9e6,
    #fff3cc,
    #ffeeb3
  );
}

/* 🌙 DARK BLUE */
body.dark{
  background:linear-gradient(
    to bottom,
    #0b1220,
    #0f1b3d,
    #0a1a4a,
    #050814
  );
  color:white;
}

/* TEXT FIX */
body.dark .welcome-top,
body.dark .header,
body.dark .nav-title,
body.dark .footer,
body.dark .marquee{
  color:#e6f0ff;
}

/* CARDS */
.music-player,
.calendar,
.nav-box{
  transition:0.5s;
}

/* LIGHT CARDS */
.music-player,
.calendar{
  background:rgba(255,255,255,0.8);
  border:3px solid #f3e7c3;
  border-radius:28px;
}

/* DARK CARDS */
body.dark .music-player,
body.dark .calendar{
  background:rgba(15,23,42,0.78);
  border:3px solid #334155;
}

/* NAV DARK */
body.dark .nav-box{
  background:rgba(2,6,23,0.95);
  border:3px solid #334155;
}

/* HEADER */
.welcome-top{
  margin-top:14px;
  font-size:20px;
  font-weight:900;
  color:#6b5b3a;
}

/* IMAGE */
.screen img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* BUTTON */
button{
  padding:10px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:#fff6d6;
  font-weight:900;
}

body.dark button{
  background:#1e2b4d;
  color:white;
}

/* CALENDAR */
.dates div{
  padding:6px;
  border-radius:10px;
  text-align:center;
  background:#fffdf3;
}

body.dark .dates div{
  background:#1e293b;
  color:white;
}

.today{
  background:#ffe08a!important;
}

/* NAV */
.nav a{
  display:block;
  text-align:center;
  margin:7px 0;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  background:#fff6d6;
  color:#5a4a2f;
}

body.dark .nav a{
  background:#1e293b;
  color:white;
}

/* FLUFF */
.fluff{
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:
  radial-gradient(circle at 10% 100%, #fff6dd 80px, transparent 81px),
  radial-gradient(circle at 30% 100%, #fff2c2 90px, transparent 91px),
  radial-gradient(circle at 50% 100%, #fff6dd 80px, transparent 81px),
  radial-gradient(circle at 70% 100%, #fff2c2 90px, transparent 91px),
  radial-gradient(circle at 90% 100%, #fff6dd 80px, transparent 81px);
}

</style>
</head>

<body>

<div class="fluff"></div>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

<!-- IMAGE -->
<div class="music-player">
<div class="screen">
<img id="themeImage">
</div>
</div>

<!-- MUSIC -->
<div class="music-player">
<div class="screen">
<iframe id="playerFrame" allow="autoplay"></iframe>
</div>
<div style="text-align:center;margin-top:10px;">
<button id="toggleBtn" onclick="togglePlay()">▶</button>
</div>
</div>

<!-- CALENDAR -->
<div class="calendar">
<div class="header" id="monthYear"></div>
<div class="dates" id="dates"></div>
</div>

<!-- NAV -->
<div class="nav-box">
<div class="nav-title">MENU</div>
<div class="nav">
<a href="https://www.chess.com">RULES</a>
<a href="https://www.youtube.com">EVENTS</a>
<a href="https://www.google.com">MEMBERS</a>
</div>
</div>

</div>

<div class="footer">Made by yogi136</div>

<script>

/* 🌙 THEME */
function updateTheme(){

let h = new Date().getHours();
let img = document.getElementById("themeImage");

if(h >= 6 && h < 18){

document.body.classList.remove("dark");
img.src = "https://i.ibb.co/qFhrggbt/image.png";

}else{

document.body.classList.add("dark");
img.src = "https://i.ibb.co/93NMvDYs/image.png";

}

}

updateTheme();
setInterval(updateTheme,60000);

/* 📅 CALENDAR */
let now=new Date();
let monthYear=document.getElementById("monthYear");
let dates=document.getElementById("dates");

const months=[
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

monthYear.innerText = months[now.getMonth()]+" "+now.getFullYear();

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

for(let i=0;i<first;i++){
dates.innerHTML+="<div></div>";
}

for(let i=1;i<=last;i++){
dates.innerHTML+=`<div class="${i===now.getDate()?'today':''}">${i}</div>`;
}

/* 🎵 MUSIC */
let songs=[{src:"https://youtu.be/kcsGhOmULxQ",name:"Golden Brown"}];

let frame=document.getElementById("playerFrame");
let btn=document.getElementById("toggleBtn");
let playing=false;

function convert(url){
let id=url.split("youtu.be/")[1];
return "https://www.youtube.com/embed/"+id+"?enablejsapi=1";
}

frame.src=convert(songs[0].src);

function togglePlay(){

if(!playing){
frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}',"*");
btn.innerText="❚❚";
}else{
frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}',"*");
btn.innerText="▶";
}

playing=!playing;

}

</script>

</body>
</html>
