<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
transition:0.5s;
background:linear-gradient(to bottom,#fffaf4,#ffe9d6,#f5d2bc,#c49a7a);
color:#1b1b1b;
}

body.dark{
background:linear-gradient(to bottom,#0f172a,#111827,#1e293b,#020617);
color:#fff;
}

.header{
margin:20px 0;
text-align:center;
}

.glow{
font-size:52px;
font-weight:1000;
letter-spacing:6px;
color:#fff;
-webkit-text-stroke:2px rgba(0,0,0,0.25);
text-shadow:0 0 10px rgba(255,140,90,0.6),
0 0 25px rgba(255,120,80,0.5);
}

.sub{
font-size:12px;
letter-spacing:5px;
opacity:0.8;
margin-top:4px;
}

.wrapper{
width:92%;
max-width:380px;
display:flex;
flex-direction:column;
gap:18px;
}

.glass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-radius:18px;
padding:14px;
border:1px solid rgba(255,255,255,0.2);
}

body.dark .glass{
background:rgba(255,255,255,0.08);
}

img{
width:100%;
border-radius:14px;
display:block;
}

.screen{
width:100%;
aspect-ratio:16/9;
border-radius:14px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

.song{
text-align:center;
font-size:13px;
font-weight:800;
margin-top:8px;
}

.controls{
display:flex;
justify-content:center;
gap:12px;
margin-top:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:50%;
cursor:pointer;
font-weight:900;
background:rgba(255,255,255,0.4);
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

.month{
text-align:center;
font-weight:900;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.date{
text-align:center;
font-size:12px;
padding:7px;
border-radius:10px;
background:rgba(255,255,255,0.25);
}

.today{
background:#ff8c5a;
color:white;
font-weight:900;
}

.nav-title{
text-align:center;
font-weight:900;
margin-bottom:10px;
letter-spacing:2px;
}

.link{
display:block;
text-align:center;
margin:8px 0;
padding:12px;
border-radius:14px;
text-decoration:none;
font-size:13px;
font-weight:900;
background:rgba(255,255,255,0.35);
color:#3b2a22;
transition:0.25s;
}

.link:hover{
transform:translateY(-2px) scale(1.03);
}

.rgb{
margin:16px;
text-align:center;
font-weight:900;
font-family:cursive;
font-size:14px;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 6s infinite;
}

@keyframes rgb{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}
</style>
</head>

<body>

<div class="header">
<div class="glow">WELCOME</div>
<div class="sub">TO SAPPHIRE CLUB</div>
</div>

<div class="wrapper">

<div class="glass">
<img id="themeImage" src="" alt="theme">
</div>

<div class="glass">
<div class="screen">
<iframe id="player"></iframe>
</div>

<div class="song">Now Playing: <span id="songName"></span></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="btn">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<div class="glass">
<div class="month" id="month"></div>
<div class="grid" id="cal"></div>
</div>

<div class="glass">
<div class="nav-title">PORTAL</div>

<a class="link" href="https://www.chess.com" target="_blank">♟ RULES</a>
<a class="link" href="https://www.youtube.com" target="_blank">🎬 EVENTS</a>
<a class="link" href="https://www.google.com" target="_blank">👥 MEMBERS</a>
<a class="link" href="#">⚡ CLICK HERE</a>

</div>

</div>

<div class="rgb">Made by yogi136 • Sapphire Club</div>

<script>

const img=document.getElementById("themeImage");

function theme(){
let h=new Date().getHours();
let dark = h < 6 || h >= 18;

document.body.classList.toggle("dark",dark);

img.src = dark
? "https://i.ibb.co/Zz89JYQ2.png"
: "https://i.ibb.co/hRjTVF3w.png";
}
theme();

/* CALENDAR */
function calendar(){
let now=new Date();
document.getElementById("month").innerText=
now.toLocaleString('default',{month:'long',year:'numeric'});

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

let cal=document.getElementById("cal");
cal.innerHTML="";

for(let i=0;i<first;i++){
cal.innerHTML += "<div></div>";
}

for(let i=1;i<=last;i++){
cal.innerHTML += `<div class="date ${i===now.getDate()?'today':''}">${i}</div>`;
}
}
calendar();

/* MUSIC */
const songs=[
{name:"Golden Brown",id:"kcsGhOmULxQ"},
{name:"Numb",id:"kXYiU_JCYtU"}
];

let i=0;
let playing=false;

const frame=document.getElementById("player");
const btn=document.getElementById("btn");

function load(x){
frame.src=`https://www.youtube.com/embed/${songs[x].id}?enablejsapi=1&origin=${location.origin}`;
document.getElementById("songName").innerText=songs[x].name;
}

load(i);

function toggle(){
playing=!playing;
btn.innerText=playing?"❚❚":"▶";

frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:playing?"playVideo":"pauseVideo",
args:[]
}),"*");
}

function next(){
i=(i+1)%songs.length;
playing=false;
btn.innerText="▶";
load(i);
}

function prev(){
i=(i-1+songs.length)%songs.length;
playing=false;
btn.innerText="▶";
load(i);
}

</script>

</body>
</html>
