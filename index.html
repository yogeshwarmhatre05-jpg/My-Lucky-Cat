<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  transition:0.5s;

  background:linear-gradient(to bottom,#fffbea,#ffe08a,#ffd36b);

  /* BASE BORDER */
  border:0px solid transparent;
}

/* 🎧 ACTIVE MUSIC BORDER */
body.music-on{
  border:8px solid #ff4d4d;
  box-shadow:
    inset 0 0 30px #ff6b6b,
    0 0 40px #ff4d4d,
    0 0 80px #ff1a1a;
  animation:pulseBorder 1.2s infinite alternate;
}

@keyframes pulseBorder{
  from{
    box-shadow:
      inset 0 0 20px #ff6b6b,
      0 0 30px #ff4d4d;
  }
  to{
    box-shadow:
      inset 0 0 50px #ff3d3d,
      0 0 90px #ff1a1a;
  }
}

/* DARK MODE */
body.dark{
  background:linear-gradient(to bottom,#0f172a,#111827,#020617);
  color:white;
}

/* toggle button */
#themeBtn{
  position:fixed;
  top:10px;
  right:10px;
  padding:8px 12px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  z-index:1000;
}

/* title */
.welcome-top{
  margin-top:14px;
  font-size:22px;
  font-weight:900;
}

/* layout */
.wrapper{
  width:100%;
  max-width:320px;
  display:flex;
  flex-direction:column;
  gap:18px;
  margin-top:20px;
}

/* cards */
.music-player, .calendar, .nav-box{
  background:rgba(255,255,255,0.75);
  border-radius:28px;
  padding:10px;
  border:3px solid #d9b79f;
}

body.dark .music-player,
body.dark .calendar,
body.dark .nav-box{
  background:rgba(15,23,42,0.85);
  border:3px solid #334155;
}

/* screen */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  border:2px solid #edd5c4;
}

/* image */
img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* calendar */
.calendar{padding:14px;}

.header{
  text-align:center;
  font-size:22px;
  font-weight:900;
}

.days,.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:#fffaf5;
  border:1px solid #edd5c4;
}

.today{
  background:#ffb38a!important;
  color:white!important;
}

/* nav */
.nav-box{
  background:#5c3b2e;
  color:white;
  border-radius:24px;
  padding:14px;
}

.nav-box a{
  display:block;
  text-align:center;
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  background:#fff1e5;
  color:#5c3b2e;
}

</style>
</head>

<body>

<button id="themeBtn">🌙 / ☀️</button>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

  <!-- IMAGE -->
  <div class="music-player">
    <div class="screen">
      <img id="themeImage" src="https://i.ibb.co/qFhrggbt/image.png">
    </div>
  </div>

  <!-- YOUTUBE -->
  <div class="music-player">
    <div class="screen">
      <div id="player"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="calendar">
    <div class="header" id="monthYear"></div>

    <div class="days">
      <div>SUN</div><div>MON</div><div>TUE</div>
      <div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
    </div>

    <div class="dates" id="dates"></div>
  </div>

  <!-- MENU -->
  <div class="nav-box">
    <a href="#">RULES</a>
    <a href="#">EVENTS</a>
    <a href="#">MEMBERS</a>
    <a href="#">CLICK HERE</a>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

/* THEME AUTO */
function updateTheme(){
  const hour=new Date().getHours();
  const img=document.getElementById("themeImage");

  if(hour>=6 && hour<18){
    document.body.classList.remove("dark");
    img.src="https://i.ibb.co/qFhrggbt/image.png";
  }else{
    document.body.classList.add("dark");
    img.src="https://i.ibb.co/93NMvDYs/image.png";
  }
}
updateTheme();
setInterval(updateTheme,60000);

/* MANUAL THEME */
document.getElementById("themeBtn").onclick=function(){
  document.body.classList.toggle("dark");
};

/* YOUTUBE */
function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{
    videoId:'kcsGhOmULxQ',
    playerVars:{autoplay:1,controls:1},
    events:{onStateChange:onStateChange}
  });
}

/* BODY BORDER CONTROL */
function onStateChange(event){
  if(event.data===YT.PlayerState.PLAYING){
    document.body.classList.add("music-on");
  }else{
    document.body.classList.remove("music-on");
  }
}

/* CALENDAR */
const monthYear=document.getElementById("monthYear");
const dates=document.getElementById("dates");

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();
const today=now.getDate();

const months=["January","February","March","April","May","June","July","August","September","October","November","December"];

monthYear.innerText=`${months[month]} ${year}`;

const firstDay=new Date(year,month,1).getDay();
const lastDate=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
  dates.innerHTML+=`<div></div>`;
}

for(let i=1;i<=lastDate;i++){
  dates.innerHTML+=`<div class="${i===today?'today':''}">${i}</div>`;
}

</script>

</body>
</html>
