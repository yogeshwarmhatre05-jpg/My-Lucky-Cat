<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  transition:0.5s;

  /* 🍌 LIGHT BANANA THEME */
  background:linear-gradient(
    to bottom,
    #fffef6 0%,
    #fff9c9 35%,
    #fff3a0 70%,
    #ffe066 100%
  );
}

/* 🌙 DARK BLUE */
body.dark{
  background:linear-gradient(
    to bottom,
    #050816 0%,
    #0a1633 40%,
    #061022 70%,
    #020617 100%
  );
  color:white;
}

/* TITLE */
.welcome-top{
  margin-top:16px;
  font-size:22px;
  font-weight:900;
  color:#5a4300;
  z-index:2;
}

body.dark .welcome-top{
  color:#f8fafc;
}

/* WRAPPER */
.wrapper{
  width:100%;
  max-width:320px;
  margin-top:18px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:2;
}

/* IMAGE */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  border:3px solid #f2d36a;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

body.dark .screen{
  border-color:#334155;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.75);
  border-radius:20px;
  padding:10px;
}

body.dark .card{
  background:rgba(15,23,42,0.85);
}

/* MUSIC + CALENDAR STYLES (kept minimal) */
.music-player, .calendar, .nav-box{
  border-radius:20px;
  padding:12px;
  background:rgba(255,255,255,0.75);
}

body.dark .music-player,
body.dark .calendar,
body.dark .nav-box{
  background:rgba(15,23,42,0.85);
}

/* BUTTON */
button{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:18px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

  <!-- 🖼 IMAGE -->
  <div class="card">
    <div class="screen">
      <img id="themeImage" src="" alt="theme">
    </div>
  </div>

  <!-- 🎵 MUSIC -->
  <div class="music-player">

    <div class="screen">
      <iframe id="playerFrame" allow="autoplay"></iframe>
    </div>

    <div style="display:flex;justify-content:center;margin-top:10px;">
      <button onclick="togglePlay()" id="btn">▶</button>
    </div>

  </div>

  <!-- 📅 CALENDAR -->
  <div class="calendar">

    <div id="monthYear" style="text-align:center;font-weight:900;margin-bottom:10px;"></div>
    <div id="dates" style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;"></div>

  </div>

  <!-- 📦 MENU -->
  <div class="nav-box">

    <div style="text-align:center;font-weight:900;margin-bottom:10px;">MENU</div>

    <a href="#">RULES</a>
    <a href="#">EVENTS</a>
    <a href="#">MEMBERS</a>

  </div>

</div>

<script>

/* 🌞🌙 THEME SWITCH */

function updateTheme(){

  const hour = new Date().getHours();
  const img = document.getElementById("themeImage");

  if(hour >= 6 && hour < 18){
    document.body.classList.remove("dark");
    img.src = "https://i.ibb.co/hRjTVF3w.jpg";
  } else {
    document.body.classList.add("dark");
    img.src = "https://i.ibb.co/Zz89JYQ2.jpg";
  }
}

updateTheme();
setInterval(updateTheme,60000);

/* 🎵 MUSIC */
let frame = document.getElementById("playerFrame");
let playing = false;

frame.src = "https://www.youtube.com/embed/kcsGhOmULxQ?enablejsapi=1";

function togglePlay(){

  let btn = document.getElementById("btn");

  if(!playing){
    frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}',"*");
    btn.innerText = "❚❚";
    playing = true;
  } else {
    frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}',"*");
    btn.innerText = "▶";
    playing = false;
  }
}

/* 📅 CALENDAR */
const now = new Date();
const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

document.getElementById("monthYear").innerText =
monthNames[now.getMonth()] + " " + now.getFullYear();

const dates = document.getElementById("dates");

let firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
let lastDate = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();

for(let i=0;i<firstDay;i++){
  dates.innerHTML += "<div></div>";
}

for(let i=1;i<=lastDate;i++){
  dates.innerHTML += `<div>${i}</div>`;
}

</script>

</body>
</html>
