<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 0 40px;
  font-family:'Poppins',sans-serif;

  background:linear-gradient(
    to bottom,
    #fffffd,
    #fdffe8,
    #f7ffd2,
    #f1ffc2
  );

  color:#374151;
  position:relative;
}

/* RGB BODY BORDER */

.rgb-border{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
}

.rgb-border::before{
  content:"";
  position:absolute;
  inset:0;

  border:3px solid transparent;

  border-image:
  linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d
  ) 1;

  animation:rgbMove 4s linear infinite;
}

@keyframes rgbMove{
  0%{
    filter:hue-rotate(0deg);
  }

  100%{
    filter:hue-rotate(360deg);
  }
}

@keyframes discoRGB {

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }
}

/* GLOW */

@keyframes glowPulse{

  0%{
    box-shadow:
    0 0 10px rgba(255,255,255,0.4),
    0 0 20px rgba(217,249,157,0.4);
  }

  50%{
    box-shadow:
    0 0 20px rgba(255,255,255,0.8),
    0 0 35px rgba(168,85,247,0.45);
  }

  100%{
    box-shadow:
    0 0 10px rgba(255,255,255,0.4),
    0 0 20px rgba(217,249,157,0.4);
  }

}

/* WELCOME */

.welcome-top{
  margin-top:8px;
  padding:16px 28px;
  border-radius:24px;
  position:relative;
  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,0.9),
    rgba(247,255,210,0.85),
    rgba(255,255,255,0.92)
  );

  border:2px solid rgba(255,255,255,0.8);

  animation:glowPulse 4s ease-in-out infinite;
}

.welcome-top::before{
  content:"✦ ✦ ✦";
  position:absolute;
  top:-6px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  letter-spacing:6px;
  color:#a855f7;
}

.welcome-top::after{
  content:"";
  position:absolute;
  inset:0;

  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );

  transform:translateX(-100%);
  animation:shine 4s linear infinite;
}

@keyframes shine{

  100%{
    transform:translateX(100%);
  }

}

.welcome-text{
  position:relative;
  z-index:2;

  font-size:34px;
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  letter-spacing:4px;
  text-align:center;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d
  );

  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:discoRGB 6s ease infinite;
}

/* OWNER */

.owner-box{
  margin-top:18px;
  width:290px;
  text-align:center;
  padding:18px 18px;
  border-radius:26px;
  position:relative;
  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,0.92),
    rgba(247,255,210,0.82)
  );

  border:2px solid rgba(255,255,255,0.8);

  animation:glowPulse 5s ease infinite;
}

.owner-box::before{
  content:"♛";
  position:absolute;
  top:10px;
  right:14px;
  font-size:22px;
  color:#a855f7;
  opacity:0.9;
}

.owner-title{
  font-size:12px;
  font-weight:800;
  letter-spacing:6px;
  color:#6b7280;
  margin-bottom:10px;
}

.owner-name{
  font-size:28px;
  font-family:'Orbitron',sans-serif;
  font-weight:900;
  letter-spacing:2px;

  background:linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:discoRGB 5s ease infinite;
  text-shadow:0 0 18px rgba(168,85,247,0.3);
}

/* WRAPPER */

.wrapper{
  width:100%;
  max-width:300px;
  display:flex;
  flex-direction:column;
  gap:18px;
  margin-top:22px;
}

/* CARDS */

.music-player,
.calendar,
.nav-box{

  width:100%;
  background:rgba(255,255,255,0.75);
  border-radius:24px;
  padding:12px;
  border:2px solid #d9f99d;
}

/* PLAYER */

.song{
  text-align:center;
  margin-bottom:10px;
  font-size:11px;
  font-weight:700;
  color:#4b5563;
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  background:black;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

/* BUTTONS */

.controls button,
.nav a{

  background:rgba(255,255,255,0.85);

  border:2px solid #d9f99d;

  color:#475569;

  font-weight:800;

  transition:0.3s;
}

/* PLAY BUTTON */

.controls button{

  width:120px;

  height:36px;

  border-radius:12px;

  cursor:pointer;

  font-size:12px;
}

/* NAV BUTTONS */

.nav a{

  display:block;

  text-align:center;

  margin:8px 0;

  padding:12px;

  border-radius:14px;

  text-decoration:none;

  font-size:12px;
}

/* HOVER */

.controls button:hover,
.nav a:hover{

  background:#f7ffd2;
}

/* CALENDAR */

.header{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
  color:#4b5563;
}

.days,
.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.days div{
  text-align:center;
  font-size:10px;
  font-weight:800;
  color:#6b7280;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:#ffffff;
  font-size:11px;
  font-weight:700;
}

.today{
  background:#d9ff8d !important;
  color:#374151 !important;
}

</style>
</head>

<body>

<div class="rgb-border"></div>

<!-- NEW BEAUTIFUL WELCOME -->

<div class="welcome-top">

  <div class="welcome-text">
    WELCOME TO SAPPHIRE
  </div>

</div>

<!-- NEW OWNER STYLE -->

<div class="owner-box">

  <div class="owner-title">
    OWNER
  </div>

  <div class="owner-name">
    Rosemarie_Hales
  </div>

</div>

</body>
</html>
