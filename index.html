<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  position:relative;
  transition:0.5s;

  /* ☀️ LIGHTEST BANANA */
  background:linear-gradient(
    to bottom,
    #fffef7 0%,
    #fff9e6 35%,
    #fff3cc 65%,
    #ffeeb3 100%
  );
}

/* 🌙 DARK MODE */
body.dark{
  background:linear-gradient(
    to bottom,
    #0f172a 0%,
    #111827 35%,
    #1e293b 65%,
    #020617 100%
  );
  color:white;
}

/* TEXT FIX */
body.dark .welcome-top,
body.dark .header,
body.dark .days div,
body.dark .footer,
body.dark .marquee,
body.dark .nav-title{
  color:#f8fafc;
}

/* CARDS */
.music-player,
.calendar,
.nav-box{
  transition:0.5s;
}

/* LIGHT CARDS */
.music-player,
.calendar{
  background:rgba(255,255,255,0.75);
  border:3px solid #f3e7c3;
  border-radius:28px;
}

/* DARK CARDS */
body.dark .music-player,
body.dark .calendar{
  background:rgba(15,23,42,0.78);
  border:3px solid #334155;
}

/* NAV */
body.dark .nav-box{
  background:rgba(2,6,23,0.95);
  border:3px solid #334155;
}

.welcome-top{
  margin-top:14px;
  font-size:20px;
  font-weight:900;
  color:#6b5b3a;
}

/* IMAGE */
.screen img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* BUTTON */
button{
  padding:10px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:#fff6d6;
  font-weight:900;
}

body.dark button{
  background:#1e2b4d;
  color:white;
}

/* CALENDAR */
.calendar{
  width:100%;
  padding:14px;
  border-radius:28px;
}

.header{
  text-align:center;
  font-size:22px;
  font-weight:900;
  color:#5c3b2e;
  margin-bottom:16px;
}

.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  font-size:11px;
  font-weight:700;
  background:#fffdf3;
  border:1px solid #edd5c4;
}

.today{
  background:#ffe08a!important;
}

/* NAV */
.nav a{
  display:block;
  text-align:center;
  margin:7px 0;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  background:#fff6d6;
  color:#5a4a2f;
}

body.dark .nav a{
  background:#1e293b;
  color:white;
}

</style>
</head>

<body>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

<!-- IMAGE -->
<div class="music-player">
<div class="screen">
<img id="themeImage">
</div>
</div>

<!-- MUSIC -->
<div class="music-player">
<div class="screen">
<iframe id="playerFrame" allow="autoplay"></iframe>
</div>
<div style="text-align:center;margin-top:10px;">
<button id="toggleBtn" onclick="togglePlay()">▶</button>
</div>
</div>

<!-- CALENDAR -->
<div class="calendar">

<div class="header" id="monthYear"></div>

<div class="dates" id="dates"></div>

</div>

<!-- NAV -->
<div class="nav-box">
<div class="nav-title">MENU</div>
<div class="nav">
<a href="https://www.chess.com">RULES</a>
<a href="https://www.youtube.com">EVENTS</a>
<a href="https://www.google.com">MEMBERS</a>
</div>
</div>

</div>

<div style="text-align:center;margin-top:10px;">
Made by yogi136
</div>

<script>

/* ☀️🌙 THEME + IMAGE */
function updateTheme(){

let hour = new Date().getHours();
let img = document.getElementById("themeImage");

if(hour >= 6 && hour < 18){

document.body.classList.remove("dark");
img.src = "https://i.ibb.co/hRjTVF3w.png";

}else{

document.body.classList.add("dark");
img.src = "https://i.ibb.co/Zz89JYQ2.png";

}

}

updateTheme();
setInterval(updateTheme,60000);

/* 📅 CALENDAR */
const monthYear = document.getElementById("monthYear");
const dates = document.getElementById("dates");

const now = new Date();
const year = now.getFullYear();
const month = now.getMonth();
const today = now.getDate();

const months = [
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

monthYear.innerText = `${months[month]} ${year}`;

const firstDay = new Date(year,month,1).getDay();
const lastDate = new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
dates.innerHTML += `<div></div>`;
}

for(let i=1;i<=lastDate;i++){
if(i===today){
dates.innerHTML += `<div class="today">${i}</div>`;
}else{
dates.innerHTML += `<div>${i}</div>`;
}
}

/* 🎵 MUSIC */
let songs = [
{ src:"https://youtu.be/kcsGhOmULxQ" }
];

let frame = document.getElementById("playerFrame");
let btn = document.getElementById("toggleBtn");
let playing = false;

function convert(url){
let id = url.split("youtu.be/")[1];
return "https://www.youtube.com/embed/"+id+"?enablejsapi=1";
}

frame.src = convert(songs[0].src);

function togglePlay(){

if(!playing){
frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}',"*");
btn.innerText="❚❚";
}else{
frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}',"*");
btn.innerText="▶";
}

playing = !playing;

}

</script>

</body>
</html>
