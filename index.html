<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
transition:0.6s;
background:linear-gradient(135deg,#fff0e6,#ffd6b3,#ffb38a,#c97b63);
background-size:400% 400%;
animation:bgFlow 10s ease infinite;
color:#1a1a1a;
}

@keyframes bgFlow{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* DARK MODE */
body.dark{
background:linear-gradient(135deg,#0b1020,#0f172a,#111827,#020617);
color:white;
}

/* HEADER */
.header{
margin:25px 0;
text-align:center;
}

.glow{
font-size:58px;
font-weight:900;
letter-spacing:7px;
color:white;
text-shadow:
0 0 10px rgba(255,120,90,0.8),
0 0 30px rgba(255,80,80,0.6),
0 0 60px rgba(255,60,60,0.3);
animation:pulse 2.2s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.07)}
}

.sub{
font-size:13px;
letter-spacing:5px;
opacity:0.85;
}

/* MAIN WRAPPER */
.wrapper{
width:92%;
max-width:390px;
display:flex;
flex-direction:column;
gap:22px;
}

/* GLASS CARDS */
.glass{
background:rgba(255,255,255,0.14);
backdrop-filter:blur(18px);
border-radius:24px;
padding:16px;
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 12px 35px rgba(0,0,0,0.25);
transition:0.3s;
}

.glass:hover{
transform:translateY(-4px);
}

/* IMAGE CARD (IMPROVED IMPORTANT PART) */
.hero-img{
width:100%;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
position:relative;
}

.hero-img img{
width:100%;
display:block;
transform:scale(1.02);
transition:0.4s;
}

.hero-img:hover img{
transform:scale(1.08);
}

/* MUSIC */
.screen{
width:100%;
aspect-ratio:16/9;
border-radius:18px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

.song{
text-align:center;
font-weight:700;
margin-top:10px;
font-size:14px;
}

.controls{
display:flex;
justify-content:center;
gap:14px;
margin-top:10px;
}

button{
padding:11px 15px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.18);
backdrop-filter:blur(10px);
cursor:pointer;
font-weight:900;
transition:0.2s;
}

button:hover{
transform:scale(1.15);
background:rgba(255,255,255,0.35);
}

button:active{
transform:scale(0.95);
}

/* CALENDAR */
.month{
text-align:center;
font-weight:900;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.date{
text-align:center;
font-size:12px;
padding:7px;
border-radius:10px;
background:rgba(255,255,255,0.25);
}

.today{
background:#ff7a4d;
color:white;
font-weight:900;
box-shadow:0 0 12px rgba(255,120,80,0.5);
}

/* NAV */
.nav-title{
text-align:center;
font-weight:900;
margin-bottom:10px;
letter-spacing:2px;
}

.link{
display:block;
text-align:center;
margin:8px 0;
padding:12px;
border-radius:14px;
text-decoration:none;
font-size:13px;
font-weight:800;
background:rgba(255,255,255,0.3);
color:#2b1f1a;
transition:0.25s;
}

.link:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.5);
}

/* FOOTER RGB */
.rgb{
margin:18px;
text-align:center;
font-weight:900;
font-size:14px;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 6s infinite;
}

@keyframes rgb{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

body{
-webkit-tap-highlight-color:transparent;
}

</style>
</head>

<body>

<div class="header">
<div class="glow">WELCOME</div>
<div class="sub">TO SAPPHIRE CLUB</div>
</div>

<div class="wrapper">

<!-- IMAGE (NOW MORE PREMIUM) -->
<div class="glass">
<div class="hero-img">
<img id="themeImage" src="https://i.ibb.co/hRjTVF3w.png">
</div>
</div>

<!-- MUSIC -->
<div class="glass">
<div class="screen">
<iframe id="player"></iframe>
</div>

<div class="song">Now Playing: <span id="songName"></span></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="btn">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<!-- CALENDAR -->
<div class="glass">
<div class="month" id="month"></div>
<div class="grid" id="cal"></div>
</div>

<!-- NAV -->
<div class="glass">
<div class="nav-title">PORTAL</div>

<a class="link" href="https://www.chess.com" target="_blank">♟ RULES</a>
<a class="link" href="https://www.youtube.com" target="_blank">🎬 EVENTS</a>
<a class="link" href="https://www.google.com" target="_blank">👥 MEMBERS</a>
<a class="link" href="#">⚡ CLICK HERE</a>

</div>

</div>

<div class="rgb">Made by yogi136 • Sapphire Club</div>

<script>

/* THEME */
function theme(){
let h=new Date().getHours();
let dark=h<6||h>=18;

document.body.classList.toggle("dark",dark);

document.getElementById("themeImage").src =
dark
? "https://i.ibb.co/Zz89JYQ2.png"
: "https://i.ibb.co/hRjTVF3w.png";
}
theme();
setInterval(theme,60000);

/* CALENDAR */
function calendar(){
let now=new Date();

document.getElementById("month").innerText =
now.toLocaleString('default',{month:'long',year:'numeric'});

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

let cal=document.getElementById("cal");
cal.innerHTML="";

for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

for(let i=1;i<=last;i++){
cal.innerHTML+=`<div class="date ${i===now.getDate()?'today':''}">${i}</div>`;
}
}
calendar();

/* MUSIC */
let songs=[
{name:"Golden Brown",id:"kcsGhOmULxQ"},
{name:"Numb",id:"kXYiU_JCYtU"}
];

let i=0;
let playing=false;

let frame=document.getElementById("player");
let btn=document.getElementById("btn");

function load(x){
frame.src=`https://www.youtube.com/embed/${songs[x].id}?enablejsapi=1&origin=${location.origin}`;
document.getElementById("songName").innerText=songs[x].name;
}

load(i);

function toggle(){
playing=!playing;
btn.innerText=playing?"❚❚":"▶";

frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:playing?"playVideo":"pauseVideo"
}),"*");
}

function next(){
i=(i+1)%songs.length;
playing=false;
btn.innerText="▶";
load(i);
}

function prev(){
i=(i-1+songs.length)%songs.length;
playing=false;
btn.innerText="▶";
load(i);
}

</script>

</body>
</html>
