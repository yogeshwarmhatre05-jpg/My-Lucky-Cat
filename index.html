<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
background:linear-gradient(135deg,#fff1e6,#ffd7ba,#ffb38a,#7c4a2d);
transition:0.5s;
overflow-x:hidden;
}

/* DARK MODE */
body.dark{
background:linear-gradient(135deg,#0f172a,#111827,#1e293b,#020617);
color:white;
}

/* GLASS CARD */
.glass{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.25);
border-radius:22px;
box-shadow:0 8px 30px rgba(0,0,0,0.15);
}

/* TOP */
.header{
margin:18px 0;
font-size:22px;
font-weight:900;
letter-spacing:2px;
}

/* WRAPPER */
.wrapper{
width:92%;
max-width:360px;
display:flex;
flex-direction:column;
gap:16px;
}

/* IMAGE */
.image-box{
padding:10px;
overflow:hidden;
}

.image-box img{
width:100%;
border-radius:18px;
}

/* MUSIC */
.music{
padding:12px;
text-align:center;
}

.screen{
width:100%;
aspect-ratio:16/9;
border-radius:16px;
overflow:hidden;
margin-bottom:10px;
}

iframe{
width:100%;
height:100%;
border:none;
}

.song{
font-size:13px;
font-weight:800;
margin-bottom:8px;
opacity:0.9;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
}

button{
border:none;
padding:10px 14px;
border-radius:50%;
cursor:pointer;
font-weight:900;
background:rgba(255,255,255,0.4);
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

/* CALENDAR */
.calendar{
padding:14px;
text-align:center;
}

.month{
font-size:18px;
font-weight:900;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
font-size:10px;
font-weight:900;
opacity:0.7;
}

.date{
height:30px;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:rgba(255,255,255,0.35);
font-size:12px;
}

.today{
background:#ff7a45;
color:white;
font-weight:900;
}

/* NAV */
.nav{
padding:14px;
text-align:center;
}

.nav-title{
font-weight:900;
margin-bottom:10px;
}

.nav a{
display:block;
margin:6px 0;
padding:10px;
border-radius:12px;
text-decoration:none;
font-size:12px;
font-weight:900;
background:rgba(255,255,255,0.5);
color:#3b2a22;
transition:0.2s;
}

.nav a:hover{
transform:scale(1.05);
}

/* RGB TEXT */
.rgb{
margin:14px 0;
font-weight:900;
font-family:cursive;
font-size:14px;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 6s infinite;
text-align:center;
}

@keyframes rgb{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* FLOAT ANIMATION */
.paw{
position:absolute;
opacity:0.12;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-120px)}
}

</style>
</head>

<body>

<div class="header">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

<!-- IMAGE -->
<div class="glass image-box">
<img id="themeImage" src="https://i.ibb.co/qFhrggbt/image.png">
</div>

<!-- MUSIC -->
<div class="glass music">
<div class="screen">
<iframe id="playerFrame"></iframe>
</div>

<div class="song">Now Playing: <span id="songName"></span></div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()" id="btn">▶</button>
<button onclick="nextSong()">⏭</button>
</div>
</div>

<!-- CALENDAR -->
<div class="glass calendar">
<div class="month" id="monthYear"></div>

<div class="grid">
<div class="day">S</div><div class="day">M</div><div class="day">T</div>
<div class="day">W</div><div class="day">T</div><div class="day">F</div><div class="day">S</div>
</div>

<div class="grid" id="dates"></div>
</div>

<!-- NAV -->
<div class="glass nav">
<div class="nav-title">CAT MENU</div>
<a href="https://www.chess.com" target="_blank">RULES</a>
<a href="https://www.youtube.com" target="_blank">EVENTS</a>
<a href="https://www.google.com" target="_blank">MEMBERS</a>
<a href="#">CLICK HERE</a>
</div>

</div>

<div class="rgb">
Made by yogi136 • Sapphire Club
</div>

<script>

/* FLOAT PAWS */
for(let i=0;i<10;i++){
let p=document.createElement("div");
p.className="paw";
p.innerHTML="🐾";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(6+Math.random()*8)+"s";
p.style.animationDelay=Math.random()*5+"s";
p.style.fontSize=(14+Math.random()*10)+"px";
document.body.appendChild(p);
}

/* THEME IMAGE */
function updateTheme(){
let h=new Date().getHours();
let img=document.getElementById("themeImage");

if(h>=6 && h<18){
document.body.classList.remove("dark");
img.src="https://i.ibb.co/qFhrggbt/image.png";
}else{
document.body.classList.add("dark");
img.src="https://i.ibb.co/93NMvDYs/image.png";
}
}
updateTheme();
setInterval(updateTheme,60000);

/* CALENDAR */
const now=new Date();
const monthNames=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

document.getElementById("monthYear").innerText =
`${monthNames[now.getMonth()]} ${now.getFullYear()}`;

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

let html="";

for(let i=0;i<first;i++) html+=`<div></div>`;

for(let i=1;i<=last;i++){
html+=`<div class="date ${i===now.getDate()?'today':''}">${i}</div>`;
}

document.getElementById("dates").innerHTML=html;

/* MUSIC */
let songs=[
{ name:"Golden Brown", url:"https://www.youtube.com/watch?v=kcsGhOmULxQ" },
{ name:"Numb", url:"https://www.youtube.com/watch?v=kXYiU_JCYtU" }
];

let index=0;
let playing=false;

let frame=document.getElementById("playerFrame");
let btn=document.getElementById("btn");

function getID(url){
return new URL(url).searchParams.get("v");
}

function load(i){
frame.src=`https://www.youtube.com/embed/${getID(songs[i].url)}?enablejsapi=1`;
document.getElementById("songName").innerText=songs[i].name;
}

load(index);

function togglePlay(){
playing=!playing;
btn.innerText=playing?"❚❚":"▶";
frame.contentWindow.postMessage(
JSON.stringify({event:"command",func:playing?"playVideo":"pauseVideo"}),"*"
);
}

function nextSong(){
index=(index+1)%songs.length;
load(index);
playing=false;
btn.innerText="▶";
}

function prevSong(){
index=(index-1+songs.length)%songs.length;
load(index);
playing=false;
btn.innerText="▶";
}

</script>

</body>
</html>
