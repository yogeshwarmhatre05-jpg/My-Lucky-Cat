<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:18px 0 40px;
  font-family:'Poppins',sans-serif;

  background:linear-gradient(
    to bottom,
    #fffffd,
    #fdffe8,
    #f7ffd2,
    #f1ffc2
  );

  color:#374151;
  position:relative;
}

/* RGB BORDER */

.rgb-border{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
}

.rgb-border::before{
  content:"";
  position:absolute;
  inset:0;

  border:3px solid transparent;

  border-image:
  linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d
  ) 1;

  animation:rgbMove 4s linear infinite;
}

@keyframes rgbMove{

  0%{
    filter:hue-rotate(0deg);
  }

  100%{
    filter:hue-rotate(360deg);
  }

}

@keyframes rgbText{

  0%{
    background-position:0% 50%;
  }

  50%{
    background-position:100% 50%;
  }

  100%{
    background-position:0% 50%;
  }

}

@keyframes shineMove{

  100%{
    left:140%;
  }

}

/* TOP SECTION */

.top-section{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  margin-top:10px;
}

/* WELCOME BOX */

.welcome-top{

  width:90%;
  max-width:340px;

  min-height:120px;

  position:relative;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  padding:22px 20px 18px;

  border-radius:28px;

  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,0.92),
    rgba(247,255,210,0.88),
    rgba(255,255,255,0.95)
  );

  border:2px solid rgba(255,255,255,0.9);

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 18px rgba(255,255,255,0.7),
  0 0 35px rgba(168,85,247,0.18);

  text-align:center;
}

.welcome-top::before{
  content:"✦ ✦ ✦";

  position:absolute;

  top:6px;
  left:50%;

  transform:translateX(-50%);

  font-size:12px;

  letter-spacing:8px;

  color:#a855f7;
}

.welcome-top::after{
  content:"";

  position:absolute;

  top:0;
  left:-120%;

  width:80%;
  height:100%;

  background:
  linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.7),
    transparent
  );

  transform:skewX(-20deg);

  animation:shineMove 4s linear infinite;
}

/* WELCOME TEXT */

.welcome-text{

  position:relative;
  z-index:2;

  width:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  text-align:center;

  font-size:32px;
  line-height:1.15;

  font-family:'Orbitron',sans-serif;
  font-weight:900;

  letter-spacing:3px;

  padding-top:8px;

  background:
  linear-gradient(
    90deg,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d,
    #ffcc00
  );

  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rgbText 6s ease infinite;
}

/* OWNER CARD */

.owner-box{

  width:90%;
  max-width:300px;

  min-height:120px;

  position:relative;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;

  padding:22px 18px;

  border-radius:28px;

  text-align:center;

  background:
  linear-gradient(
    135deg,
    rgba(255,255,255,0.95),
    rgba(247,255,210,0.85)
  );

  border:2px solid rgba(255,255,255,0.85);

  backdrop-filter:blur(10px);

  box-shadow:
  0 0 20px rgba(255,255,255,0.7),
  0 0 30px rgba(59,130,246,0.15);
}

.owner-box::before{
  content:"🍀";

  position:absolute;

  top:8px;
  right:14px;

  font-size:24px;

  color:#a855f7;
}

/* OWNER TITLE */

.owner-title{

  width:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  text-align:center;

  font-size:12px;

  font-weight:800;

  letter-spacing:6px;

  color:#6b7280;

  margin-bottom:10px;
}

/* OWNER NAME */

.owner-name{

  width:100%;

  display:flex;
  justify-content:center;
  align-items:center;

  text-align:center;

  font-size:30px;

  line-height:1.2;

  font-family:'Orbitron',sans-serif;

  font-weight:900;

  letter-spacing:2px;

  padding:0 8px;

  background:
  linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:rgbText 6s ease infinite;
}

/* WRAPPER */

.wrapper{
  width:100%;
  max-width:300px;
  display:flex;
  flex-direction:column;
  gap:18px;
  margin-top:22px;
}

/* CARDS */

.music-player,
.calendar,
.nav-box{

  width:100%;
  background:rgba(255,255,255,0.78);

  border-radius:24px;

  padding:12px;

  border:2px solid #d9f99d;

  box-shadow:
  0 0 15px rgba(255,255,255,0.6),
  0 0 25px rgba(168,85,247,0.08);
}

/* PLAYER */

.song{
  text-align:center;
  margin-bottom:10px;
  font-size:11px;
  font-weight:700;
  color:#4b5563;
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  background:black;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.controls{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

/* BUTTONS */

.controls button,
.nav a{

  background:rgba(255,255,255,0.9);

  border:2px solid #d9f99d;

  color:#475569;

  font-weight:800;

  transition:0.3s;
}

/* PLAY BUTTON */

.controls button{

  width:120px;

  height:36px;

  border-radius:12px;

  cursor:pointer;

  font-size:12px;
}

/* NAV BUTTONS */

.nav a{

  display:block;

  text-align:center;

  margin:8px 0;

  padding:12px;

  border-radius:14px;

  text-decoration:none;

  font-size:12px;
}

/* HOVER */

.controls button:hover,
.nav a:hover{

  background:#f7ffd2;

  transform:scale(1.03);
}

/* CALENDAR */

.header{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
  color:#4b5563;
}

.days,
.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.days div{
  text-align:center;
  font-size:10px;
  font-weight:800;
  color:#6b7280;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:#ffffff;
  font-size:11px;
  font-weight:700;
}

.today{
  background:#d9ff8d !important;
  color:#374151 !important;
}

</style>
</head>

<body>

<div class="rgb-border"></div>

<!-- TOP SECTION -->

<div class="top-section">

  <!-- WELCOME -->

  <div class="welcome-top">

    <div class="welcome-text">
    SAPPHIRE
    </div>

  </div>

  <!-- OWNER -->

  <div class="owner-box">

    <div class="owner-title">
      OWNER
    </div>

    <div class="owner-name">
      Rosemarie
    </div>

  </div>

</div>

<div class="wrapper">

  <!-- PLAYER -->

  <div class="music-player">

    <div class="song">
      Now Playing : CHIHIRO - Billie Eilish
    </div>

    <div class="screen">

      <iframe
      id="playerFrame"
      src="https://www.youtube.com/embed/e_AZJzYe7CU?enablejsapi=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
      </iframe>

    </div>

    <div class="controls">

      <button id="playBtn">
        PLAY
      </button>

    </div>

  </div>

  <!-- CALENDAR -->

  <div class="calendar">

    <div class="header" id="monthYear"></div>

    <div class="days">

      <div>SUN</div>
      <div>MON</div>
      <div>TUE</div>
      <div>WED</div>
      <div>THU</div>
      <div>FRI</div>
      <div>SAT</div>

    </div>

    <div class="dates" id="dates"></div>

  </div>

  <!-- NAVIGATION -->

  <div class="nav-box">

    <div class="nav">

      <a href="https://www.chess.com/clubs/forum/view/club-rules-578">
        RULES
      </a>

      <a href="https://www.chess.com/clubs/events/sapphire-1">
        EVENTS
      </a>

      <a href="https://www.chess.com/clubs/members/sapphire-1">
        MEMBERS
      </a>

      <a href="https://www.chess.com/clubs/forum/view/dont-click-here-14">
        CLICK HERE
      </a>

    </div>

  </div>

</div>

<!-- FOOTER -->

<div style="text-align:center; margin-top:18px;">

  <div id="yogiText" style="
    font-size:22px;
    font-weight:900;
    font-family:cursive;
    background:linear-gradient(
      90deg,
      #ff4d4d,
      #ffcc00,
      #22c55e,
      #3b82f6,
      #a855f7
    );
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rgbText 6s ease infinite;
    display:inline-block;
  ">
    Made by yogi136.Sapphire
  </div>

</div>

<script>

/* VIDEO PLAYER */

const frame =
document.getElementById("playerFrame");

const playBtn =
document.getElementById("playBtn");

let playing = false;

playBtn.addEventListener("click",()=>{

  if(!playing){

    frame.contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}',
    "*"
    );

    playBtn.innerText = "PAUSE";

    playing = true;

  }else{

    frame.contentWindow.postMessage(
    '{"event":"command","func":"pauseVideo","args":""}',
    "*"
    );

    playBtn.innerText = "PLAY";

    playing = false;

  }

});

/* CALENDAR */

const monthYear =
document.getElementById("monthYear");

const dates =
document.getElementById("dates");

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const today = now.getDate();

const months = [

"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"

];

monthYear.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

  dates.innerHTML += `<div></div>`;

}

for(let i=1;i<=lastDate;i++){

  dates.innerHTML +=
  `<div class="${i===today?'today':''}">
  ${i}
  </div>`;

}

</script>

</body>
</html>
