<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Newest Members</title>

<style>
body {
  background: #06152b;
  font-family: sans-serif;
}

.card {
  background: #0b1e3a;
  border-radius: 16px;
  padding: 12px;
  color: white;
  width: 300px;
  margin: auto;
}

.title {
  background: linear-gradient(90deg, #2d4fff, #4a6cff);
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
}

.member {
  display: flex;
  align-items: center;
  background: #102a54;
  border-radius: 12px;
  padding: 8px;
  margin-bottom: 8px;
}

.member img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

.info {
  margin-left: 10px;
  flex: 1;
}

.username {
  font-weight: bold;
}

.time {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">🍀 ✦ NEWEST MEMBERS ✦</div>
  <div id="membersList">Loading...</div>
</div>

<script>
const url = "https://raw.githubusercontent.com/yogeshwarmhatre05-jpg/My-personal-code-for-study/92be64da9857954b4e7e2d45f3f29bf56bcb5b7c/members.json";

async function loadMembers() {
  try {
   const res = await fetch(url + "?t=" + Date.now());
    const members = await res.json();

    const container = document.getElementById("membersList");
    container.innerHTML = "";

    members.forEach(member => {
      const div = document.createElement("div");
      div.className = "member";

      div.innerHTML = `
        <img src="${member.avatar}">
        <div class="info">
          <div class="username">${member.username}</div>
          <div>${member.rating}</div>
        </div>
        <div class="time">⏱ ${member.time}</div>
      `;

      container.appendChild(div);
    });

  } catch (e) {
    document.getElementById("membersList").innerText = "Failed to load =(";
  }
}

loadMembers();

// Auto refresh every 60 seconds
setInterval(loadMembers, 60000);
</script>

</body>
</html>
