
<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sapphire Club</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"><style>

/* basic reset */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 10px 40px;
  font-family: Poppins, sans-serif;

  background: radial-gradient(circle at top, #1e3a8a, #0f172a 50%, #020617);
  color:#f5d77a;
}

/* border glow (kept simple) */
.border{
  position:fixed;
  inset:0;
  pointer-events:none;
}

.border::before{
  content:"";
  position:absolute;
  inset:0;
  border:2px solid rgba(255,215,0,0.7);
  box-shadow:0 0 25px rgba(255,215,0,0.25);
}

/* top section */
.top{
  width:100%;
  max-width:340px;
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-top:10px;
}

.box{
  background:rgba(10,25,55,0.85);
  border:1px solid rgba(255,215,0,0.5);
  border-radius:20px;
  padding:18px;
  text-align:center;
}

.title{
  font-family: Orbitron, sans-serif;
  font-size:28px;
  font-weight:900;
}

.small{
  font-size:12px;
  opacity:0.9;
}

.owner{
  font-family: Orbitron;
  font-size:26px;
  margin-top:5px;
}

/* main wrapper */
.wrapper{
  width:100%;
  max-width:340px;
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:rgba(10,25,55,0.85);
  border:1px solid rgba(255,215,0,0.4);
  border-radius:18px;
  padding:12px;
}

/* player */
.video{
  width:100%;
  aspect-ratio:16/9;
  border-radius:12px;
  overflow:hidden;
  background:#000;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

button{
  margin-top:10px;
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(255,215,0,0.6);
  background:#0f172a;
  color:#f5d77a;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

/* calendar */
.cal-header{
  text-align:center;
  font-weight:700;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.day, .date{
  text-align:center;
  font-size:11px;
}

.date{
  padding:6px 0;
  border-radius:8px;
  background:#0f172a;
}

.today{
  background:#ffd700;
  color:#000;
}

/* nav */
.nav a{
  display:block;
  text-align:center;
  padding:10px;
  margin:6px 0;
  text-decoration:none;
  color:#f5d77a;
  border:1px solid rgba(255,215,0,0.5);
  border-radius:10px;
}

.nav a:active{
  transform:scale(0.98);
}

</style></head><body><div class="border"></div><div class="top">  <div class="box">
    <div class="title">SAPPHIRE</div>
    <div class="small">welcome section</div>
  </div>  <div class="box">
    <div class="small">OWNER</div>
    <div class="owner">Rosemarie</div>
  </div></div><div class="wrapper">  <!-- player -->  <div class="card">
    <div class="small">Now Playing - Billie Eilish</div><div class="video">
  <iframe id="player" src="https://www.youtube.com/embed/e_AZJzYe7CU?enablejsapi=1"></iframe>
</div>

<button id="btn">PLAY / PAUSE</button>

  </div>  <!-- calendar -->  <div class="card">
    <div class="cal-header" id="head"></div><div class="grid">
  <div class="day">S</div><div class="day">M</div><div class="day">T</div><div class="day">W</div><div class="day">T</div><div class="day">F</div><div class="day">S</div>
</div>

<div class="grid" id="dates"></div>

  </div>  <!-- nav -->  <div class="card nav">
    <a href="#">RULES</a>
    <a href="#">EVENTS</a>
    <a href="#">MEMBERS</a>
    <a href="#">CLICK HERE</a>
  </div></div><script>

// video toggle (simple version)
const frame = document.getElementById("player");
const btn = document.getElementById("btn");
let playing = false;

btn.onclick = () => {
  frame.contentWindow.postMessage(
    JSON.stringify({event:"command", func: playing ? "pauseVideo" : "playVideo"}), "*"
  );
  playing = !playing;
};

// calendar
const now = new Date();
const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

document.getElementById("head").innerText = months[now.getMonth()] + " " + now.getFullYear();

const dates = document.getElementById("dates");
const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
const last = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();

for(let i=0;i<first;i++) dates.innerHTML += "<div></div>";

for(let i=1;i<=last;i++){
  const cls = i === now.getDate() ? "date today" : "date";
  dates.innerHTML += `<div class='${cls}'>${i}</div>`;
}

</script></body>
</html>
