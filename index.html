<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  font-family:'Montserrat',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 0 40px;

  background:
  linear-gradient(
    to bottom,
    #fffffb,
    #faffea,
    #f5ffd6,
    #efffc7
  );

  color:#374151;
}

/* RGB RUNNING BORDER */

body::before{
  content:"";
  position:fixed;
  inset:0;
  padding:2px;

  background:linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d
  );

  background-size:500% 500%;

  animation:rgbMove 4s linear infinite;

  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:2px;

  background:
  linear-gradient(
    to bottom,
    #fffffb,
    #faffea,
    #f5ffd6,
    #efffc7
  );

  z-index:-1;
}

@keyframes rgbMove{
  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:500% 50%;
  }
}

/* TITLE */

.welcome-top{
  margin-top:10px;
  font-size:25px;
  font-weight:900;
  letter-spacing:3px;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  background-size:300% 300%;

  animation:rgbMove 6s linear infinite;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* OWNER */

.owner{
  margin-top:10px;
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
  color:#4b5563;
}

/* WRAPPER */

.wrapper{
  width:100%;
  max-width:300px;

  display:flex;
  flex-direction:column;
  gap:18px;

  margin-top:20px;
}

/* CARD */

.music-player,
.calendar,
.nav-box{

  width:100%;

  background:
  rgba(255,255,255,0.7);

  border-radius:24px;

  padding:12px;

  border:2px solid transparent;

  position:relative;

  overflow:hidden;
}

/* RGB BORDER EFFECT */

.music-player::before,
.calendar::before,
.nav-box::before{

  content:"";

  position:absolute;

  inset:0;

  padding:2px;

  border-radius:24px;

  background:linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d
  );

  background-size:500% 500%;

  animation:rgbMove 4s linear infinite;

  -webkit-mask:
  linear-gradient(#fff 0 0) content-box,
  linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;
}

/* SCREEN */

.screen{
  width:100%;
  aspect-ratio:16/9;

  border-radius:16px;

  overflow:hidden;

  background:black;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* SONG */

.song{
  text-align:center;

  margin-bottom:10px;

  font-size:11px;

  font-weight:700;

  color:#4b5563;
}

/* BUTTON */

.controls{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.controls button{

  width:80px;
  height:32px;

  border:none;

  border-radius:12px;

  font-size:12px;

  font-weight:700;

  cursor:pointer;

  color:white;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6
  );

  background-size:200% 200%;

  animation:rgbMove 5s linear infinite;
}

/* CALENDAR */

.header{
  text-align:center;

  font-size:20px;

  font-weight:900;

  margin-bottom:12px;

  color:#4b5563;
}

.days,
.dates{

  display:grid;

  grid-template-columns:repeat(7,1fr);

  gap:5px;
}

.days div{

  text-align:center;

  font-size:10px;

  font-weight:800;

  color:#6b7280;
}

.dates div{

  height:30px;

  display:flex;

  justify-content:center;

  align-items:center;

  border-radius:10px;

  background:#ffffff;

  font-size:11px;

  font-weight:700;
}

.today{

  background:#d9ff8d !important;

  color:#374151 !important;
}

/* NAV */

.nav a{

  display:block;

  text-align:center;

  margin:8px 0;

  padding:12px;

  border-radius:14px;

  text-decoration:none;

  font-size:12px;

  font-weight:800;

  color:white;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  background-size:300% 300%;

  animation:rgbMove 5s linear infinite;
}

/* FOOTER */

.footer{

  margin-top:16px;

  font-size:20px;

  font-weight:900;

  background:linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  background-size:300% 300%;

  animation:rgbMove 6s linear infinite;

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<div class="welcome-top">
  WELCOME TO SAPPHIRE
</div>

<div class="owner">
  owner • Rosemarie_Hales
</div>

<div class="wrapper">

  <!-- PLAYER -->

  <div class="music-player">

    <div class="song" id="songText">
      Now Playing : Golden Brown
    </div>

    <div class="screen">

      <iframe
      id="playerFrame"
      allow="autoplay; fullscreen">
      </iframe>

    </div>

    <div class="controls">

      <button onclick="toggleVideo()">
        PLAY / PAUSE
      </button>

    </div>

  </div>

  <!-- CALENDAR -->

  <div class="calendar">

    <div class="header" id="monthYear"></div>

    <div class="days">

      <div>SUN</div>
      <div>MON</div>
      <div>TUE</div>
      <div>WED</div>
      <div>THU</div>
      <div>FRI</div>
      <div>SAT</div>

    </div>

    <div class="dates" id="dates"></div>

  </div>

  <!-- NAV -->

  <div class="nav-box">

    <div class="nav">

      <a href="#">RULES</a>

      <a href="#">EVENTS</a>

      <a href="#">MEMBERS</a>

      <a href="#">CLICK HERE</a>

    </div>

  </div>

</div>

<div class="footer">
  Made by yogi136
</div>

<script>

/* VIDEO */

const frame =
document.getElementById("playerFrame");

frame.src =
"https://www.youtube.com/embed/kcsGhOmULxQ?enablejsapi=1";

let playing = false;

function toggleVideo(){

  if(!playing){

    frame.contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}',
    "*"
    );

    playing = true;

  }else{

    frame.contentWindow.postMessage(
    '{"event":"command","func":"pauseVideo","args":""}',
    "*"
    );

    playing = false;

  }

}

/* CALENDAR */

const monthYear =
document.getElementById("monthYear");

const dates =
document.getElementById("dates");

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const today = now.getDate();

const months = [

"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"

];

monthYear.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

  dates.innerHTML += `<div></div>`;

}

for(let i=1;i<=lastDate;i++){

  dates.innerHTML +=
  `<div class="${i===today?'today':''}">
  ${i}
  </div>`;

}

</script>

</body>
</html>
