<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
transition:0.5s;

/* 🌅 COLOR THEME */
background:linear-gradient(to bottom,#fffaf4,#ffe9d6,#f5d2bc,#c49a7a);
}

/* DARK MODE */
body.dark{
background:linear-gradient(to bottom,#0f172a,#111827,#1e293b,#020617);
color:white;
}

/* PARTICLES */
.particle{
position:fixed;
width:5px;
height:5px;
background:white;
border-radius:50%;
opacity:0.15;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* HEADER */
.header{
margin:18px 0;
text-align:center;
display:flex;
flex-direction:column;
gap:4px;
z-index:2;
}

/* 🔥 UPDATED WELCOME SIZE */
.glow{
font-size:42px;
font-weight:900;
letter-spacing:4px;
color:#fff;
text-shadow:0 0 10px rgba(255,140,90,0.8),
0 0 20px rgba(255,140,90,0.5);
animation:pulse 2.5s infinite;
}

.sub{
font-size:12px;
letter-spacing:4px;
opacity:0.8;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

/* WRAPPER */
.wrapper{
width:92%;
max-width:360px;
display:flex;
flex-direction:column;
gap:16px;
z-index:2;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
padding:12px;
border:1px solid rgba(255,255,255,0.2);
}

/* IMAGE */
img{
width:100%;
border-radius:16px;
}

/* MUSIC */
.screen{
width:100%;
aspect-ratio:16/9;
border-radius:16px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

.song{
text-align:center;
font-size:13px;
font-weight:800;
margin:8px 0;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:50%;
cursor:pointer;
font-weight:900;
background:rgba(255,255,255,0.4);
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

/* CALENDAR */
.month{
text-align:center;
font-weight:900;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.date{
text-align:center;
font-size:12px;
padding:6px;
border-radius:10px;
background:rgba(255,255,255,0.3);
}

.today{
background:#ffb38a;
color:white;
font-weight:900;
}

/* NAV */
.nav-title{
text-align:center;
font-weight:900;
margin-bottom:10px;
letter-spacing:2px;
}

.link{
display:flex;
align-items:center;
justify-content:center;
margin:8px 0;
padding:12px;
border-radius:14px;
text-decoration:none;
font-size:13px;
font-weight:900;
background:rgba(255,255,255,0.35);
color:#3b2a22;
position:relative;
overflow:hidden;
transition:0.25s;
}

.link::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
transition:0.5s;
}

.link:hover::before{
left:100%;
}

.link:hover{
transform:translateY(-2px) scale(1.03);
}

/* RGB */
.rgb{
margin:14px;
text-align:center;
font-weight:900;
font-family:cursive;
font-size:14px;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 6s infinite;
}

@keyframes rgb{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}
</style>
</head>

<body>

<div class="header">
<div class="glow">WELCOME</div>
<div class="sub">TO SAPPHIRE CLUB</div>
</div>

<div class="wrapper">

<div class="glass">
<img id="themeImage" src="https://i.ibb.co/qFhrggbt/image.png">
</div>

<div class="glass">
<div class="screen">
<iframe id="player"></iframe>
</div>

<div class="song">Now Playing: <span id="songName"></span></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="btn">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<div class="glass">
<div class="month" id="month"></div>
<div class="grid" id="cal"></div>
</div>

<div class="glass">
<div class="nav-title">PORTAL</div>

<a class="link" href="https://www.chess.com" target="_blank">♟ RULES</a>
<a class="link" href="https://www.youtube.com" target="_blank">🎬 EVENTS</a>
<a class="link" href="https://www.google.com" target="_blank">👥 MEMBERS</a>
<a class="link" href="#">⚡ CLICK HERE</a>
</div>

</div>

<div class="rgb">Made by yogi136 • Sapphire Club</div>

<script>

/* PARTICLES */
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="particle";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(d);
}

/* THEME */
function theme(){
let h=new Date().getHours();
document.body.classList.toggle("dark",!(h>=6 && h<18));
}
theme();

/* CALENDAR */
let now=new Date();
document.getElementById("month").innerText=
now.toLocaleString('default',{month:'long',year:'numeric'});

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

let html="";
for(let i=0;i<first;i++) html+="<div></div>";
for(let i=1;i<=last;i++){
html+=`<div class="date ${i===now.getDate()?'today':''}">${i}</div>`;
}
document.getElementById("cal").innerHTML=html;

/* MUSIC */
let songs=[
{name:"Golden Brown",url:"https://www.youtube.com/watch?v=kcsGhOmULxQ"},
{name:"Numb",url:"https://www.youtube.com/watch?v=kXYiU_JCYtU"}
];

let i=0,playing=false;
let frame=document.getElementById("player");
let btn=document.getElementById("btn");

function id(u){return new URL(u).searchParams.get("v");}

function load(x){
frame.src=`https://www.youtube.com/embed/${id(songs[x].url)}?enablejsapi=1`;
document.getElementById("songName").innerText=songs[x].name;
}

load(i);

function toggle(){
playing=!playing;
btn.innerText=playing?"❚❚":"▶";
frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:playing?"playVideo":"pauseVideo"
}),"*");
}

function next(){
i=(i+1)%songs.length;
load(i);playing=false;btn.innerText="▶";
}

function prev(){
i=(i-1+songs.length)%songs.length;
load(i);playing=false;btn.innerText="▶";
}

</script>

</body>
</html>
