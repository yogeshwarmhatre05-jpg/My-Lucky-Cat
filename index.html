<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
color:#fff;
transition:0.5s;
background:linear-gradient(120deg,#fffaf4,#ffe9d6,#f5d2bc,#c49a7a);
background-size:300% 300%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

body.dark{
background:linear-gradient(120deg,#0f172a,#111827,#1e293b,#020617);
}

.header{
margin:24px 0;
text-align:center;
}

.glow{
font-size:54px;
font-weight:800;
letter-spacing:6px;
text-shadow:0 0 10px rgba(255,140,90,0.6),
0 0 25px rgba(255,100,80,0.5);
animation:pulse 2.5s infinite;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.05)}
}

.sub{
font-size:12px;
letter-spacing:5px;
opacity:0.8;
margin-top:6px;
}

.wrapper{
width:92%;
max-width:380px;
display:flex;
flex-direction:column;
gap:22px;
}

/* GLASS CARD */
.glass{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(16px);
border-radius:22px;
padding:16px;
border:1px solid rgba(255,255,255,0.25);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
transition:0.3s;
}

.glass:hover{
transform:translateY(-3px);
}

img{
width:100%;
border-radius:18px;
}

.screen{
width:100%;
aspect-ratio:16/9;
border-radius:18px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

.song{
text-align:center;
font-size:14px;
font-weight:600;
margin-top:10px;
}

.controls{
display:flex;
justify-content:center;
gap:12px;
margin-top:10px;
}

button{
padding:10px 14px;
border-radius:50%;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
cursor:pointer;
font-weight:800;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
background:rgba(255,255,255,0.3);
}

button:active{
transform:scale(0.95);
}

/* CALENDAR */
.month{
text-align:center;
font-weight:800;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.date{
text-align:center;
font-size:12px;
padding:7px;
border-radius:10px;
background:rgba(255,255,255,0.2);
}

.today{
background:#ff8c5a;
color:white;
font-weight:900;
}

/* NAV */
.nav-title{
text-align:center;
font-weight:800;
margin-bottom:10px;
letter-spacing:2px;
}

.link{
display:block;
text-align:center;
margin:8px 0;
padding:12px;
border-radius:14px;
text-decoration:none;
font-size:13px;
font-weight:800;
background:rgba(255,255,255,0.25);
color:#3b2a22;
transition:0.25s;
}

.link:hover{
transform:translateY(-2px) scale(1.03);
}

/* FOOTER RGB */
.rgb{
margin:18px;
text-align:center;
font-weight:800;
font-size:14px;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 6s infinite;
}

@keyframes rgb{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* MOBILE FEEL */
body{
-webkit-tap-highlight-color:transparent;
}

</style>
</head>

<body>

<div class="header">
<div class="glow">WELCOME</div>
<div class="sub">TO SAPPHIRE CLUB</div>
</div>

<div class="wrapper">

<!-- IMAGE -->
<div class="glass">
<img id="themeImage" src="https://i.ibb.co/hRjTVF3w.png">
</div>

<!-- MUSIC -->
<div class="glass">
<div class="screen">
<iframe id="player"></iframe>
</div>

<div class="song">Now Playing: <span id="songName"></span></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="btn">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<!-- CALENDAR -->
<div class="glass">
<div class="month" id="month"></div>
<div class="grid" id="cal"></div>
</div>

<!-- NAV -->
<div class="glass">
<div class="nav-title">PORTAL</div>

<a class="link" href="https://www.chess.com" target="_blank">♟ RULES</a>
<a class="link" href="https://www.youtube.com" target="_blank">🎬 EVENTS</a>
<a class="link" href="https://www.google.com" target="_blank">👥 MEMBERS</a>
<a class="link" href="#">⚡ CLICK HERE</a>

</div>

</div>

<div class="rgb">Made by yogi136 • Sapphire Club</div>

<script>

/* THEME */
function theme(){
let h=new Date().getHours();
let dark=h<6||h>=18;

document.body.classList.toggle("dark",dark);

document.getElementById("themeImage").src =
dark
? "https://i.ibb.co/Zz89JYQ2.png"
: "https://i.ibb.co/hRjTVF3w.png";
}
theme();
setInterval(theme,60000);

/* CALENDAR */
function renderCalendar(){
let now=new Date();

document.getElementById("month").innerText =
now.toLocaleString('default',{month:'long',year:'numeric'});

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

let cal=document.getElementById("cal");
cal.innerHTML="";

for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

for(let i=1;i<=last;i++){
cal.innerHTML+=`<div class="date ${i===now.getDate()?'today':''}">${i}</div>`;
}
}
renderCalendar();

/* MUSIC */
let songs=[
{name:"Golden Brown",id:"kcsGhOmULxQ"},
{name:"Numb",id:"kXYiU_JCYtU"}
];

let i=0;
let playing=false;

let frame=document.getElementById("player");
let btn=document.getElementById("btn");

function load(x){
frame.src=`https://www.youtube.com/embed/${songs[x].id}?enablejsapi=1&origin=${location.origin}`;
document.getElementById("songName").innerText=songs[x].name;
}

load(i);

function toggle(){
playing=!playing;
btn.innerText=playing?"❚❚":"▶";

frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:playing?"playVideo":"pauseVideo"
}),"*");
}

function next(){
i=(i+1)%songs.length;
playing=false;
btn.innerText="▶";
load(i);
}

function prev(){
i=(i-1+songs.length)%songs.length;
playing=false;
btn.innerText="▶";
load(i);
}

</script>

</body>
</html>
