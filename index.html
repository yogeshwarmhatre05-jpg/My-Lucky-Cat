<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
transition:0.5s;
background:linear-gradient(135deg,#ffe9d6,#ffb38a,#7c4a2d);
}

/* DARK */
body.dark{
background:linear-gradient(135deg,#0f172a,#111827,#020617);
color:white;
}

/* PARTICLES */
.particle{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.2;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* HEADER */
.header{
margin:18px;
font-size:22px;
font-weight:900;
letter-spacing:2px;
z-index:2;
}

/* WRAPPER */
.wrapper{
width:92%;
max-width:360px;
display:flex;
flex-direction:column;
gap:16px;
z-index:2;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
padding:12px;
border:1px solid rgba(255,255,255,0.2);
}

/* IMAGE */
img{
width:100%;
border-radius:16px;
}

/* MUSIC */
.screen{
width:100%;
aspect-ratio:16/9;
border-radius:16px;
overflow:hidden;
}

iframe{
width:100%;
height:100%;
border:none;
}

.song{
text-align:center;
font-size:13px;
font-weight:800;
margin:8px 0;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:50%;
cursor:pointer;
font-weight:900;
background:rgba(255,255,255,0.4);
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

/* CALENDAR */
.month{
text-align:center;
font-weight:900;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day,.date{
text-align:center;
font-size:12px;
}

.date{
padding:6px;
border-radius:10px;
background:rgba(255,255,255,0.3);
}

.today{
background:#ff7a45;
color:white;
font-weight:900;
}

/* NAV */
.nav a{
display:block;
margin:6px 0;
padding:10px;
border-radius:12px;
text-decoration:none;
font-size:12px;
font-weight:900;
background:rgba(255,255,255,0.4);
color:#3b2a22;
transition:0.2s;
}

.nav a:hover{
transform:scale(1.05);
}

/* RGB */
.rgb{
margin:14px;
text-align:center;
font-weight:900;
font-family:cursive;
font-size:14px;
background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:rgb 6s infinite;
}

@keyframes rgb{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* PAWS */
.paw{
position:absolute;
opacity:0.1;
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-100px);}
}
</style>
</head>

<body>

<div class="header">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

<div class="glass">
<img id="themeImage" src="https://i.ibb.co/qFhrggbt/image.png">
</div>

<div class="glass">
<div class="screen">
<iframe id="player"></iframe>
</div>

<div class="song">Now Playing: <span id="songName"></span></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="toggle()" id="btn">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<div class="glass">
<div class="month" id="month"></div>
<div class="grid" id="cal"></div>
</div>

<div class="glass nav">
<a href="https://www.chess.com">RULES</a>
<a href="https://www.youtube.com">EVENTS</a>
<a href="#">MEMBERS</a>
</div>

</div>

<div class="rgb">Made by yogi136 • Sapphire Club</div>

<script>

/* PARTICLES */
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="particle";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(d);
}

/* THEME MEMORY */
function setTheme(){
let saved=localStorage.getItem("theme");
let hour=new Date().getHours();

if(saved){
document.body.classList.toggle("dark",saved==="dark");
}else{
document.body.classList.toggle("dark",!(hour>=6 && hour<18));
}
}
setTheme();

setInterval(()=>{
let hour=new Date().getHours();
document.getElementById("themeImage").src=
(hour>=6 && hour<18)
?"https://i.ibb.co/qFhrggbt/image.png"
:"https://i.ibb.co/93NMvDYs/image.png";
},60000);

/* CALENDAR */
let now=new Date();
document.getElementById("month").innerText=
now.toLocaleString('default',{month:'long',year:'numeric'});

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

let cal="";

for(let i=0;i<first;i++) cal+="<div></div>";

for(let i=1;i<=last;i++){
cal+=`<div class="date ${i===now.getDate()?'today':''}">${i}</div>`;
}

document.getElementById("cal").innerHTML=cal;

/* MUSIC */
let songs=[
{name:"Golden Brown",url:"https://www.youtube.com/watch?v=kcsGhOmULxQ"},
{name:"Numb",url:"https://www.youtube.com/watch?v=kXYiU_JCYtU"}
];

let i=0,playing=false;
let frame=document.getElementById("player");
let btn=document.getElementById("btn");

function id(u){return new URL(u).searchParams.get("v");}

function load(x){
frame.src=`https://www.youtube.com/embed/${id(songs[x].url)}?enablejsapi=1`;
document.getElementById("songName").innerText=songs[x].name;
}

load(i);

function toggle(){
playing=!playing;
btn.innerText=playing?"❚❚":"▶";
frame.contentWindow.postMessage(JSON.stringify({
event:"command",
func:playing?"playVideo":"pauseVideo"
}),"*");
}

function next(){
i=(i+1)%songs.length;
load(i);playing=false;btn.innerText="▶";
}

function prev(){
i=(i-1+songs.length)%songs.length;
load(i);playing=false;btn.innerText="▶";
}

</script>

</body>
</html>
