<!DOCTYPE html>
<html>
<body style="margin: 0; background: #333; display: flex; justify-content: center;">

    <canvas id="myCanvas" width="300" height="1200"></canvas>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();

        // Replace this with the actual path to your image file
        img.src = '1000008877.jpg'; 

        img.onload = function() {
            // Calculate scale to fill the 300x1200 area (Aspect Fill)
            const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
            const x = (canvas.width / 2) - (img.width / 2) * scale;
            const y = (canvas.height / 2) - (img.height / 2) * scale;

            ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
        };
    </script>
</body>
</html>
