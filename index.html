<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Montserrat',sans-serif;
  overflow-x:hidden;
  position:relative;
  transition:1s;
  padding-bottom:40px;

  background:#0F172A;
}

/* RGB BORDER */

body::before{
  content:"";
  position:fixed;
  inset:0;
  padding:3px;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6,
    #a855f7,
    #ff4d4d,
    #ffcc00,
    #22c55e
  );

  background-size:400% 400%;
  animation:rgbMove 8s linear infinite;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:3px;
  background:#0F172A;
  z-index:-1;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  100%{background-position:400% 50%;}
}

/* DARK */

body.dark{
  background:#020617;
  color:white;
}

/* TITLE */

.welcome-top{
  margin-top:18px;
  font-size:24px;
  font-weight:900;
  letter-spacing:4px;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6,
    #a855f7,
    #22c55e
  );

  background-size:300% 300%;
  animation:rgbMove 6s linear infinite;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:0 0 18px rgba(59,130,246,0.5);
}

/* WRAPPER */

.wrapper{
  width:100%;
  max-width:300px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:2;
  margin-top:20px;
}

/* CARDS */

.music-player,
.calendar,
.nav-box{

  width:100%;

  background:rgba(15,23,42,0.78);

  border:2px solid #1E293B;

  border-radius:26px;

  padding:12px;

  backdrop-filter:blur(10px);

  box-shadow:0 0 20px rgba(34,197,94,0.15);

  transition:1s;
}

/* LIVE DOT */

.music-player{
  position:relative;
}

.music-player::after{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;

  background:#22c55e;

  position:absolute;
  top:10px;
  left:10px;

  box-shadow:0 0 10px #22c55e;

  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  50%{
    opacity:0.3;
  }
}

/* SCREEN */

.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  border:2px solid #1E293B;
  background:black;
  position:relative;
}

.screen::before{
  content:"";
  position:absolute;
  inset:0;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent
  );

  animation:shine 3s linear infinite;
  z-index:1;
}

@keyframes shine{
  0%{
    transform:translateX(-100%);
  }
  100%{
    transform:translateX(100%);
  }
}

iframe,
img{
  width:100%;
  height:100%;
  border:none;
  object-fit:cover;
  display:block;
}

/* PLAYER */

.song{
  text-align:center;
  margin-bottom:8px;
  font-size:11px;
  color:#22c55e;
  font-weight:700;
}

/* BUTTONS */

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.controls button{
  width:35px;
  height:30px;
  border:none;
  border-radius:10px;
  background:#1E293B;
  color:white;
  font-size:12px;
  cursor:pointer;
}

/* CALENDAR */

.header{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
  color:#22c55e;
}

.days,
.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.days div{
  text-align:center;
  font-size:10px;
  font-weight:800;
  color:#94a3b8;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;

  border-radius:10px;

  background:#1E293B;

  border:1px solid #334155;

  font-size:11px;
  font-weight:700;

  color:white;
}

.today{
  background:#22c55e !important;
  color:#0F172A !important;

  box-shadow:0 0 15px rgba(34,197,94,0.8);
}

/* NAV */

.nav a{
  display:block;
  text-align:center;
  margin:8px 0;
  padding:12px;

  border-radius:14px;

  text-decoration:none;

  font-size:12px;
  font-weight:900;

  color:white;

  background:linear-gradient(
    90deg,
    #22c55e,
    #3b82f6
  );

  background-size:200% 200%;

  animation:rgbMove 5s linear infinite;

  transition:0.3s;
}

.nav a:hover{
  transform:scale(1.04);
}

/* FOOTER */

.footer{
  margin-top:10px;
  font-size:22px;
  font-weight:900;

  background:linear-gradient(
    90deg,
    #ff4d4d,
    #ffcc00,
    #22c55e,
    #3b82f6,
    #a855f7
  );

  background-size:300% 300%;
  animation:rgbMove 6s linear infinite;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<div class="welcome-top">
  SAPPHIRE CLUB
</div>

<div class="wrapper">

  <!-- CAT -->
  <div class="music-player">
    <div class="screen">
      <img id="themeImage" src="">
    </div>
  </div>

  <!-- VIDEO -->
  <div class="music-player">

    <div class="song" id="songText">
      Now Playing
    </div>

    <div class="screen">

      <iframe
      id="playerFrame"
      allow="autoplay; fullscreen">
      </iframe>

    </div>

    <div class="controls">

      <button onclick="prevSong()">⏮</button>

      <button onclick="playVideo()">▶</button>

      <button onclick="pauseVideo()">❚❚</button>

      <button onclick="nextSong()">⏭</button>

    </div>

  </div>

  <!-- CALENDAR -->
  <div class="calendar">

    <div class="header" id="monthYear"></div>

    <div class="days">
      <div>SUN</div>
      <div>MON</div>
      <div>TUE</div>
      <div>WED</div>
      <div>THU</div>
      <div>FRI</div>
      <div>SAT</div>
    </div>

    <div class="dates" id="dates"></div>

  </div>

  <!-- NAV -->
  <div class="nav-box">

    <div class="nav">

      <a href="#">RULES</a>

      <a href="#">EVENTS</a>

      <a href="#">MEMBERS</a>

      <a href="#">CLICK HERE</a>

    </div>

  </div>

</div>

<div class="footer">
  Made by yogi136
</div>

<script>

/* DAY NIGHT IMAGE */

const dayCat =
"https://i.ibb.co/qFhrggbt/image.png";

const nightCat =
"https://i.ibb.co/Zz89JYQ2";

/* THEME */

function updateTheme(){

  const hour = new Date().getHours();

  const img =
  document.getElementById("themeImage");

  if(hour >= 6 && hour < 18){

    document.body.classList.remove("dark");

    img.src = dayCat;

  }else{

    document.body.classList.add("dark");

    img.src = nightCat;

  }

}

updateTheme();

setInterval(updateTheme,60000);

/* SONGS */

let songs = [

{
src:"https://youtu.be/kcsGhOmULxQ",
name:"Golden Brown"
},

{
src:"https://youtu.be/qdpXxGPqW-Y",
name:"Faded"
},

{
src:"https://youtu.be/R5aurUlfn3w",
name:"Monody"
},

{
src:"https://youtu.be/Jkj36B1YuDU",
name:"Another Love"
}

];

let songIndex = 0;

const frame =
document.getElementById("playerFrame");

const songText =
document.getElementById("songText");

function loadVideo(i){

  let id =
  songs[i].src.split("youtu.be/")[1];

  frame.src =
  "https://www.youtube.com/embed/" +
  id +
  "?enablejsapi=1";

  songText.innerText =
  "Now Playing : " + songs[i].name;

}

function prevSong(){

  songIndex--;

  if(songIndex < 0){

    songIndex = songs.length - 1;

  }

  loadVideo(songIndex);

}

function nextSong(){

  songIndex++;

  if(songIndex >= songs.length){

    songIndex = 0;

  }

  loadVideo(songIndex);

}

function playVideo(){

  frame.contentWindow.postMessage(
  '{"event":"command","func":"playVideo","args":""}',
  "*"
  );

}

function pauseVideo(){

  frame.contentWindow.postMessage(
  '{"event":"command","func":"pauseVideo","args":""}',
  "*"
  );

}

loadVideo(songIndex);

/* CALENDAR */

const monthYear =
document.getElementById("monthYear");

const dates =
document.getElementById("dates");

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const today = now.getDate();

const months = [

"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"

];

monthYear.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

  dates.innerHTML += `<div></div>`;

}

for(let i=1;i<=lastDate;i++){

  dates.innerHTML +=
  `<div class="${i===today?'today':''}">
  ${i}
  </div>`;

}

</script>

</body>
</html>
