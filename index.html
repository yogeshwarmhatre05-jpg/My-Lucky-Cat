<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  position:relative;
  transition:0.5s;

  background:linear-gradient(
    to bottom,
    #fffbea 0%,
    #fff3c4 35%,
    #ffe08a 65%,
    #ffd36b 100%
  );
}

/* 🌙 DARK MODE */
body.dark{

  background:linear-gradient(
    to bottom,
    #0f172a 0%,
    #111827 35%,
    #1e293b 65%,
    #020617 100%
  );

  color:white;
}

body.dark .welcome-top{
  color:#f8fafc;
  text-shadow:0 2px 8px rgba(255,255,255,0.2);
}

body.dark .music-player,
body.dark .calendar{
  background:rgba(15,23,42,0.78);
  border:3px solid #334155;
}

body.dark .header,
body.dark .days div,
body.dark .footer,
body.dark .marquee{
  color:#f8fafc;
}

body.dark .dates div{
  background:#1e293b;
  border:1px solid #334155;
  color:white;
}

body.dark .today{
  background:#3b82f6!important;
  color:white!important;
}

body.dark .nav-box{
  background:rgba(2,6,23,0.95);
  border:3px solid #334155;
}

body.dark .nav-title{
  color:#f8fafc;
}

body.dark .nav a{
  background:linear-gradient(to right,#1e293b,#334155);
  color:white;
}

body.dark .single-control button{
  background:linear-gradient(to bottom,#1e293b,#334155);
  color:white;
}

body.dark .fluff{
  background:
  radial-gradient(circle at 10% 100%, #1e293b 80px, transparent 81px),
  radial-gradient(circle at 30% 100%, #0f172a 90px, transparent 91px),
  radial-gradient(circle at 50% 100%, #1e293b 80px, transparent 81px),
  radial-gradient(circle at 70% 100%, #0f172a 90px, transparent 91px),
  radial-gradient(circle at 90% 100%, #1e293b 80px, transparent 81px);
}

/* paw */
.paw{
  position:absolute;
  font-size:20px;
  opacity:0.15;
  animation:float 10s linear infinite;
  z-index:0;
}

@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);}
  100%{transform:translateY(-120px) rotate(360deg);}
}

/* title */
.welcome-top{
  margin-top:14px;
  font-size:20px;
  font-weight:900;
  color:#5c3b2e;
  letter-spacing:2px;
  z-index:2;
}

/* wrapper */
.wrapper{
  width:100%;
  max-width:290px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:2;
  margin-top:20px;
}

/* cards */
.music-player, .calendar, .nav-box{
  background:rgba(255,255,255,0.72);
  border-radius:28px;
  padding:10px;
  border:3px solid #d9b79f;
  backdrop-filter:blur(6px);
  box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

/* image */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  border:2px solid #edd5c4;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* calendar */
.calendar{
  padding:14px;
}

.header{
  text-align:center;
  font-size:22px;
  font-weight:900;
  color:#5c3b2e;
  margin-bottom:16px;
}

.days, .dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.days div{
  text-align:center;
  font-size:10px;
  font-weight:800;
  color:#7a5b49;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  font-size:11px;
  font-weight:700;
  background:#fffaf5;
  border:1px solid #edd5c4;
}

.today{
  background:#ffb38a!important;
  color:white!important;
}

/* nav */
.nav-box{
  background:rgba(92,59,46,0.95);
  border:3px solid #f3d5bf;
  border-radius:24px;
  padding:14px;
  color:white;
}

.nav-title{
  text-align:center;
  font-size:13px;
  font-weight:900;
  margin-bottom:10px;
  color:#ffe7d2;
}

.nav a{
  display:block;
  text-align:center;
  margin:7px 0;
  padding:10px;
  border-radius:14px;
  text-decoration:none;
  font-size:12px;
  font-weight:900;
  color:#5c3b2e;
  background:linear-gradient(to right,#fff1e5,#ffd2b5);
}

/* fluff */
.fluff{
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:
  radial-gradient(circle at 10% 100%, #fff3e6 80px, transparent 81px),
  radial-gradient(circle at 30% 100%, #ffe8d1 90px, transparent 91px),
  radial-gradient(circle at 50% 100%, #fff3e6 80px, transparent 81px),
  radial-gradient(circle at 70% 100%, #ffe8d1 90px, transparent 91px),
  radial-gradient(circle at 90% 100%, #fff3e6 80px, transparent 81px);
}

</style>
</head>

<body>

<div class="fluff"></div>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<script>
for(let i=0;i<18;i++){
  let p=document.createElement("div");
  p.className="paw";
  p.innerHTML="🐾";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(6+Math.random()*8)+"s";
  document.body.appendChild(p);
}
</script>

<div class="wrapper">

  <!-- 🖼 IMAGE -->
  <div class="music-player">
    <div class="screen">
      <img id="themeImage" src="https://i.ibb.co/qFhrggbt/image.png" alt="theme image">
    </div>
  </div>

  <!-- 🎵 MUSIC -->
  <div class="music-player">
    <div class="screen">
      <iframe id="playerFrame" src="" allow="autoplay; fullscreen"></iframe>
    </div>
  </div>

  <!-- 📅 CALENDAR -->
  <div class="calendar">
    <div class="header" id="monthYear"></div>

    <div class="days">
      <div>SUN</div><div>MON</div><div>TUE</div>
      <div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
    </div>

    <div class="dates" id="dates"></div>
    <div class="footer">🎃 SAPPHIRE SOCIAL CLUB 🎃</div>
  </div>

  <!-- 📦 MENU -->
  <div class="nav-box">
    <div class="nav-title">CAT MENU</div>
    <div class="nav">
      <a href="#">RULES</a>
      <a href="#">EVENTS</a>
      <a href="#">MEMBERS</a>
      <a href="#">CLICK HERE</a>
    </div>
  </div>

</div>

<script>

/* THEME SWITCH */
function updateTheme(){

  const hour=new Date().getHours();
  const img=document.getElementById("themeImage");

  if(hour>=6 && hour<18){
    document.body.classList.remove("dark");
    img.src="https://i.ibb.co/qFhrggbt/image.png";
  }else{
    document.body.classList.add("dark");
    img.src="https://i.ibb.co/93NMvDYs/image.png";
  }
}

updateTheme();
setInterval(updateTheme,60000);

/* CALENDAR */
const monthYear=document.getElementById("monthYear");
const dates=document.getElementById("dates");

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();
const today=now.getDate();

const months=["January","February","March","April","May","June","July","August","September","October","November","December"];

monthYear.innerText=`${months[month]} ${year}`;

const firstDay=new Date(year,month,1).getDay();
const lastDate=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
  dates.innerHTML+=`<div></div>`;
}

for(let i=1;i<=lastDate;i++){
  dates.innerHTML+=`<div class="${i===today?'today':''}">${i}</div>`;
}

</script>

</body>
</html>
