<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  position:relative;
  transition:0.5s;

  /* ☀️ BANANA DAY THEME */
  background:linear-gradient(
    to bottom,
    #fff9e6 0%,
    #fff1c1 35%,
    #ffe7a3 65%,
    #f6d365 100%
  );
}

/* 🌙 NIGHT THEME */
body.dark{
  background:linear-gradient(
    to bottom,
    #0b132b 0%,
    #1c2541 35%,
    #0a1128 65%,
    #050a1a 100%
  );
  color:white;
}

/* IMAGE */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  border:2px solid #edd5c4;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* paw animation */
.paw{
  position:absolute;
  font-size:20px;
  opacity:0.15;
  animation:float 10s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-120px);}
}

/* wrapper */
.wrapper{
  width:100%;
  max-width:290px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:2;
  margin-top:20px;
}

/* music + calendar + nav */
.music-player, .calendar, .nav-box{
  background:rgba(255,255,255,0.72);
  border-radius:28px;
  padding:10px;
  border:3px solid #d9b79f;
  backdrop-filter:blur(6px);
}

body.dark .music-player,
body.dark .calendar,
body.dark .nav-box{
  background:rgba(10,15,35,0.8);
  border:3px solid #2b3a67;
}

/* calendar */
.calendar{
  padding:14px;
}

.header{
  text-align:center;
  font-size:22px;
  font-weight:900;
}

.days, .dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:#fffaf5;
}

/* nav */
.nav a{
  display:block;
  text-align:center;
  margin:6px 0;
  padding:8px;
  border-radius:12px;
  text-decoration:none;
  background:#fff1e5;
  font-weight:800;
}

/* fluff */
.fluff{
  position:absolute;
  bottom:0;
  width:100%;
  height:120px;
  background:
  radial-gradient(circle at 10% 100%, #fff3e6 80px, transparent 81px),
  radial-gradient(circle at 30% 100%, #ffe8d1 90px, transparent 91px),
  radial-gradient(circle at 50% 100%, #fff3e6 80px, transparent 81px),
  radial-gradient(circle at 70% 100%, #ffe8d1 90px, transparent 91px),
  radial-gradient(circle at 90% 100%, #fff3e6 80px, transparent 81px);
}

</style>
</head>

<body>

<div class="fluff"></div>

<div class="wrapper">

  <!-- 🖼 IMAGE -->
  <div class="music-player">
    <div class="screen">
      <img id="themeImage" src="https://i.ibb.co/hRjTVF3w.png" alt="theme">
    </div>
  </div>

  <!-- 🎵 PLACEHOLDER PLAYER -->
  <div class="music-player">
    🎵 Music Player Here
  </div>

  <!-- 📅 CALENDAR -->
  <div class="calendar">
    <div class="header" id="monthYear"></div>
    <div class="days">
      <div>SUN</div><div>MON</div><div>TUE</div>
      <div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
    </div>
    <div class="dates" id="dates"></div>
  </div>

  <!-- 📦 NAV -->
  <div class="nav-box">
    <div class="nav">
      <a href="#">RULES</a>
      <a href="#">EVENTS</a>
      <a href="#">MEMBERS</a>
    </div>
  </div>

</div>

<script>

/* 🐾 paws */
for(let i=0;i<15;i++){
  let p=document.createElement("div");
  p.className="paw";
  p.innerHTML="🐾";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(6+Math.random()*8)+"s";
  document.body.appendChild(p);
}

/* ☀️🌙 THEME SWITCH */
function updateTheme(){

  const hour=new Date().getHours();
  const img=document.getElementById("themeImage");

  if(hour>=6 && hour<18){
    document.body.classList.remove("dark");
    img.src="https://i.ibb.co/hRjTVF3w.png"; // DAY
  }else{
    document.body.classList.add("dark");
    img.src="https://i.ibb.co/Zz89JYQ2.png"; // NIGHT
  }
}

updateTheme();
setInterval(updateTheme,60000);

</script>

</body>
</html>
