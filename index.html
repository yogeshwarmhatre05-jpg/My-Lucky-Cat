<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  position:relative;
  transition:0.5s;

  /* 🍌 LIGHT BANANA (PASTEL) */
  background:linear-gradient(
    to bottom,
    #fffdf6,
    #fff7dd,
    #fff1c2,
    #ffeaa8
  );
}

/* 🌙 DARK BLUE THEME */
body.dark{

  background:linear-gradient(
    to bottom,
    #0b1220,
    #0f1b3d,
    #0a1a4a,
    #050814
  );

  color:white;
}

/* TEXT FIX */
body.dark .welcome-top,
body.dark .header,
body.dark .nav-title,
body.dark .footer,
body.dark .marquee{
  color:#e6f0ff;
}

/* CARDS */
.music-player,
.calendar,
.nav-box{
  transition:0.5s;
}

/* LIGHT MODE CARDS */
.music-player,
.calendar{
  background:rgba(255,255,255,0.75);
  border:3px solid #f3e2b8;
  border-radius:28px;
}

/* DARK MODE CARDS */
body.dark .music-player,
body.dark .calendar{
  background:rgba(15,23,42,0.78);
  border:3px solid #334155;
}

/* NAV */
body.dark .nav-box{
  background:rgba(2,6,23,0.95);
  border:3px solid #334155;
}

.welcome-top{
  margin-top:14px;
  font-size:20px;
  font-weight:900;
  color:#6b5b3a;
}

/* IMAGE */
.screen img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  border-radius:16px;
}

/* BUTTON */
button{
  padding:10px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:#fff6d6;
  font-weight:900;
}

body.dark button{
  background:#1e2b4d;
  color:white;
}

/* CALENDAR */
.dates div{
  padding:6px;
  border-radius:10px;
  text-align:center;
  background:#fffaf0;
}

body.dark .dates div{
  background:#1e293b;
  color:white;
}

.today{
  background:#ffd166!important;
}

/* NAV */
.nav a{
  display:block;
  text-align:center;
  margin:7px 0;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  background:#fff4d6;
  color:#5a4a2f;
}

body.dark .nav a{
  background:#1e293b;
  color:white;
}

</style>
</head>

<body>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

<!-- IMAGE -->
<div class="music-player">
<div class="screen">
<img id="themeImage">
</div>
</div>

<!-- MUSIC -->
<div class="music-player">

<div class="screen">
<iframe id="playerFrame" allow="autoplay"></iframe>
</div>

<div style="text-align:center;margin-top:10px;">
<button id="toggleBtn" onclick="togglePlay()">▶</button>
</div>

</div>

<!-- CALENDAR -->
<div class="calendar">

<div class="header" id="monthYear"></div>

<div class="dates" id="dates"></div>

</div>

<!-- NAV -->
<div class="nav-box">

<div class="nav-title">MENU</div>

<div class="nav">
<a href="https://www.chess.com">RULES</a>
<a href="https://www.youtube.com">EVENTS</a>
<a href="https://www.google.com">MEMBERS</a>
</div>

</div>

</div>

<div class="footer">Made by yogi136</div>

<script>

/* 🌙 THEME SWITCH */
function updateTheme(){

let h = new Date().getHours();
let img = document.getElementById("themeImage");

if(h >= 6 && h < 18){

document.body.classList.remove("dark");
img.src = "https://i.ibb.co/qFhrggbt/image.png";

}else{

document.body.classList.add("dark");
img.src = "https://i.ibb.co/93NMvDYs/image.png";

}

}

updateTheme();
setInterval(updateTheme,60000);

/* 📅 CALENDAR */
let now=new Date();
let monthYear=document.getElementById("monthYear");
let dates=document.getElementById("dates");

const months=[
"Jan","Feb","Mar","Apr","May","Jun",
"Jul","Aug","Sep","Oct","Nov","Dec"
];

monthYear.innerText = months[now.getMonth()]+" "+now.getFullYear();

let first=new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

for(let i=0;i<first;i++){
dates.innerHTML+="<div></div>";
}

for(let i=1;i<=last;i++){

if(i===now.getDate()){
dates.innerHTML+=`<div class="today">${i}</div>`;
}else{
dates.innerHTML+=`<div>${i}</div>`;
}

}

/* 🎵 MUSIC */
let songs=[
{
src:"https://youtu.be/kcsGhOmULxQ",
name:"Golden Brown"
}
];

let i=0;
let playing=false;

let frame=document.getElementById("playerFrame");
let btn=document.getElementById("toggleBtn");

function convert(url){
let id=url.split("youtu.be/")[1];
return "https://www.youtube.com/embed/"+id+"?enablejsapi=1";
}

function load(){
frame.src=convert(songs[i].src);
}

load();

/* toggle */
function togglePlay(){

if(!playing){
frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}',"*");
btn.innerText="❚❚";
playing=true;
}else{
frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}',"*");
btn.innerText="▶";
playing=false;
}

}

</script>

</body>
</html>
