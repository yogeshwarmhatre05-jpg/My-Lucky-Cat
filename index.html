<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  transition:0.5s;
  background:linear-gradient(to bottom,#fffbea,#ffe08a,#ffd36b);
}

body.dark{
  background:linear-gradient(to bottom,#0f172a,#111827,#020617);
  color:white;
}

#themeBtn{
  position:fixed;
  top:10px;
  right:10px;
  padding:8px 12px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  z-index:1000;
}

.welcome-top{
  margin-top:14px;
  font-size:22px;
  font-weight:900;
}

.wrapper{
  width:100%;
  max-width:320px;
  display:flex;
  flex-direction:column;
  gap:18px;
  margin-top:20px;
}

.music-player, .calendar, .nav-box{
  background:rgba(255,255,255,0.75);
  border-radius:28px;
  padding:10px;
  border:3px solid #d9b79f;
}

body.dark .music-player,
body.dark .calendar,
body.dark .nav-box{
  background:rgba(15,23,42,0.85);
  border:3px solid #334155;
}

.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  border:2px solid #edd5c4;
  position:relative;
}

#player{
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CALENDAR */
.calendar{padding:14px;}

.header{
  text-align:center;
  font-size:22px;
  font-weight:900;
  margin-bottom:10px;
}

.days,.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.days div{
  text-align:center;
  font-size:10px;
  font-weight:800;
}

.dates div{
  height:32px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  background:#fffaf5;
  border:1px solid #edd5c4;
  font-weight:bold;
  color:#3b2a22;
}

body.dark .dates div{
  background:#1f2937;
  border:1px solid #334155;
  color:white;
}

.today{
  background:#ffb38a!important;
  color:white!important;
}

body.dark .today{
  background:#ff6b6b!important;
}

.nav-box{
  background:#5c3b2e;
  color:white;
  border-radius:24px;
  padding:14px;
}

.nav-box a{
  display:block;
  text-align:center;
  margin:6px 0;
  padding:10px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  background:#fff1e5;
  color:#5c3b2e;
}

</style>
</head>

<body>

<button id="themeBtn">🌙 / ☀️</button>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

  <!-- 🐱 CAT IMAGE -->
  <div class="music-player">
    <div class="screen">
      <img id="catImg" src="">
    </div>
  </div>

  <!-- 🎥 YOUTUBE -->
  <div class="music-player">
    <div class="screen">
      <div id="player"></div>
    </div>
  </div>

  <!-- 📅 CALENDAR -->
  <div class="calendar">
    <div class="header" id="monthYear"></div>

    <div class="days">
      <div>SUN</div><div>MON</div><div>TUE</div>
      <div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
    </div>

    <div class="dates" id="dates"></div>
  </div>

  <!-- MENU -->
  <div class="nav-box">
    <a href="#">RULES</a>
    <a href="#">EVENTS</a>
    <a href="#">MEMBERS</a>
    <a href="#">CLICK HERE</a>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

/* 🐱 YOUR IMAGES */
const dayCat = "https://i.ibb.co/qFhrggbt/image.png";

/* NEW NIGHT IMAGE (your link) */
const nightCat = "https://i.ibb.co/Zz89JYQ2";

/* THEME SWITCH */
function updateTheme(){
  const hour=new Date().getHours();
  const cat=document.getElementById("catImg");

  if(hour>=6 && hour<18){
    document.body.classList.remove("dark");
    cat.src = dayCat;
  }else{
    document.body.classList.add("dark");
    cat.src = nightCat;
  }
}

updateTheme();
setInterval(updateTheme,60000);

/* MANUAL THEME */
document.getElementById("themeBtn").onclick=function(){
  document.body.classList.toggle("dark");
};

/* YOUTUBE */
function onYouTubeIframeAPIReady(){
  player=new YT.Player('player',{
    videoId:'kcsGhOmULxQ',
    playerVars:{autoplay:1,controls:1},
    events:{onStateChange:onStateChange}
  });
}

/* BORDER EFFECT */
function onStateChange(event){
  if(event.data===YT.PlayerState.PLAYING){
    document.body.style.boxShadow="0 0 60px #ff3d3d inset, 0 0 80px #ff1a1a";
  }else{
    document.body.style.boxShadow="none";
  }
}

/* CALENDAR */
const monthYear=document.getElementById("monthYear");
const dates=document.getElementById("dates");

const now=new Date();
const year=now.getFullYear();
const month=now.getMonth();
const today=now.getDate();

const months=["January","February","March","April","May","June","July","August","September","October","November","December"];

monthYear.innerText=`${months[month]} ${year}`;

const firstDay=new Date(year,month,1).getDay();
const lastDate=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){
  dates.innerHTML+=`<div></div>`;
}

for(let i=1;i<=lastDate;i++){
  dates.innerHTML+=`<div class="${i===today?'today':''}">${i}</div>`;
}

</script>

</body>
</html>
