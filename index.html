<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sapphire Club</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  position:relative;
  transition:0.5s;

  /* ☀️ LIGHT BANANA THEME */
  background:linear-gradient(
    to bottom,
    #fff9db 0%,
    #fff3b0 35%,
    #ffe680 70%,
    #ffd24d 100%
  );
}

/* 🌙 DARK BLUE THEME */

body.dark{
  background:linear-gradient(
    to bottom,
    #0b1220 0%,
    #0a1a33 35%,
    #06142a 70%,
    #020617 100%
  );
  color:white;
}

/* paw (unchanged) */
.paw{
  position:absolute;
  font-size:20px;
  opacity:0.15;
  animation:float 10s linear infinite;
  z-index:0;
}

@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);}
  100%{transform:translateY(-120px) rotate(360deg);}
}

/* title */
.welcome-top{
  margin-top:14px;
  font-size:22px;
  font-weight:900;
  color:#5c3b00;
  letter-spacing:2px;
  z-index:2;
}

body.dark .welcome-top{
  color:#f8fafc;
}

/* wrapper */
.wrapper{
  width:100%;
  max-width:290px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:2;
  margin-top:20px;
}

/* image box */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  border:2px solid #e6c24a;
}

body.dark .screen{
  border-color:#334155;
}

img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* music + calendar (kept minimal changes) */
.music-player, .calendar{
  background:rgba(255,255,255,0.75);
  border-radius:28px;
  padding:12px;
  transition:0.5s;
}

body.dark .music-player,
body.dark .calendar{
  background:rgba(15,23,42,0.85);
  color:white;
}

/* nav */
.nav-box{
  background:#6b4f00;
  color:white;
  border-radius:24px;
  padding:14px;
}

body.dark .nav-box{
  background:#0f172a;
}

</style>
</head>

<body>

<div class="welcome-top">WELCOME TO SAPPHIRE</div>

<div class="wrapper">

  <!-- 🖼 IMAGE -->
  <div class="screen">
    <img id="themeImage" src="https://ibb.co/hRjTVF3w" alt="theme image">
  </div>

</div>

<script>

/* ☀️🌙 THEME SWITCH + IMAGE SWITCH */

function updateTheme(){

  const hour = new Date().getHours();
  const img = document.getElementById("themeImage");

  if(hour >= 6 && hour < 18){
    document.body.classList.remove("dark");

    // ☀️ DAY IMAGE
    img.src = "https://ibb.co/hRjTVF3w";

  } else {
    document.body.classList.add("dark");

    // 🌙 NIGHT IMAGE
    img.src = "https://ibb.co/Zz89JYQ2";
  }
}

updateTheme();
setInterval(updateTheme,60000);

</script>

</body>
</html>
