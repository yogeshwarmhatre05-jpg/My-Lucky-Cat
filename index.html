<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sapphire Club</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow-x:hidden;
  transition:0.6s;
  background:linear-gradient(to bottom,#fffaf4,#ffe9d6,#f5d2bc,#c49a7a);
}

body.dark{
  background:linear-gradient(to bottom,#0f172a,#111827,#1e293b,#020617);
  color:white;
}

/* HEADER */
.header{
  margin:18px 0;
  text-align:center;
}

.glow{
  font-size:58px;
  font-weight:1000;
  letter-spacing:6px;
  color:#fff;
  text-shadow:0 0 10px rgba(255,140,90,0.6),
               0 0 25px rgba(255,80,80,0.4);
}

.sub{
  font-size:12px;
  letter-spacing:4px;
  opacity:0.8;
}

/* WRAPPER */
.wrapper{
  width:92%;
  max-width:360px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* GLASS */
.glass{
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:12px;
  border:1px solid rgba(255,255,255,0.2);
}

/* IMAGE */
img{
  width:100%;
  border-radius:16px;
}

/* PLAYER */
.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.song{
  text-align:center;
  font-size:13px;
  font-weight:800;
  margin:8px 0;
}

/* BUTTONS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  font-weight:900;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(6px);
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  transition:0.2s;
}

button:hover{
  transform:scale(1.1);
}

/* CALENDAR */
.month{
  text-align:center;
  font-weight:900;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.date{
  text-align:center;
  font-size:12px;
  padding:6px;
  border-radius:10px;
  background:rgba(255,255,255,0.3);
}

.today{
  background:#ffb38a;
  color:white;
  font-weight:900;
}

/* DARK MODE FIX */
body.dark .date{
  background:rgba(255,255,255,0.08);
  color:white;
}

/* LINKS */
.nav-title{
  text-align:center;
  font-weight:900;
  margin-bottom:10px;
}

.link{
  display:flex;
  justify-content:center;
  margin:8px 0;
  padding:12px;
  border-radius:14px;
  text-decoration:none;
  font-size:13px;
  font-weight:900;
  background:rgba(255,255,255,0.35);
  color:#3b2a22;
  transition:0.25s;
}

.link:hover{
  transform:translateY(-2px) scale(1.03);
}

/* RGB TEXT */
.rgb{
  margin:14px;
  text-align:center;
  font-weight:900;
  font-family:cursive;
  font-size:14px;
  background:linear-gradient(90deg,#ff4d4d,#ffcc00,#22c55e,#3b82f6,#a855f7);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:rgb 6s infinite;
}

@keyframes rgb{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}
</style>
</head>

<body>

<div class="header">
  <div class="glow">WELCOME</div>
  <div class="sub">TO SAPPHIRE CLUB</div>
</div>

<div class="wrapper">

<!-- IMAGE -->
<div class="glass">
  <img id="themeImage" src="https://i.ibb.co/hRjTVF3w.png">
</div>

<!-- MUSIC -->
<div class="glass">
  <div class="screen">
    <iframe id="player"></iframe>
  </div>

  <div class="song">Now Playing: <span id="songName"></span></div>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()" id="btn">▶</button>
    <button onclick="next()">⏭</button>
  </div>
</div>

<!-- CALENDAR -->
<div class="glass">
  <div class="month" id="month"></div>
  <div class="grid" id="cal"></div>
</div>

<!-- NAV -->
<div class="glass">
  <div class="nav-title">PORTAL</div>
  <a class="link" href="https://www.chess.com" target="_blank">♟ RULES</a>
  <a class="link" href="https://www.youtube.com" target="_blank">🎬 EVENTS</a>
  <a class="link" href="https://www.google.com" target="_blank">👥 MEMBERS</a>
</div>

</div>

<div class="rgb">Made by yogi136 • Sapphire Club</div>

<script>

/* THEME */
function theme(){
  let h = new Date().getHours();
  let img = document.getElementById("themeImage");

  if(h >= 6 && h < 18){
    document.body.classList.remove("dark");
    img.src = "https://i.ibb.co/hRjTVF3w.png";
  } else {
    document.body.classList.add("dark");
    img.src = "https://i.ibb.co/Zz89JYQ2.png";
  }
}
theme();
setInterval(theme, 60000);

/* CALENDAR */
let now = new Date();

document.getElementById("month").innerText =
now.toLocaleString('default',{month:'long',year:'numeric'});

let first = new Date(now.getFullYear(),now.getMonth(),1).getDay();
let last = new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

let html = "";

let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
html += days.map(d=>`<div class="date" style="font-weight:900">${d}</div>`).join("");

for(let i=0;i<first;i++) html += "<div></div>";

for(let i=1;i<=last;i++){
  html += `<div class="date ${i===now.getDate()?'today':''}">${i}</div>`;
}

document.getElementById("cal").innerHTML = html;

/* MUSIC */
let songs = [
  {name:"Golden Brown",url:"https://www.youtube.com/watch?v=kcsGhOmULxQ"},
  {name:"Numb",url:"https://www.youtube.com/watch?v=kXYiU_JCYtU"}
];

let i = 0;
let playing = false;

let frame = document.getElementById("player");
let btn = document.getElementById("btn");

function id(u){
  return new URL(u).searchParams.get("v");
}

function load(x){
  i = x;
  frame.src = `https://www.youtube.com/embed/${id(songs[i].url)}?enablejsapi=1`;
  document.getElementById("songName").innerText = songs[i].name;
}

load(i);

function toggle(){
  playing = !playing;
  btn.innerText = playing ? "❚❚" : "▶";

  if(playing){
    frame.src += "&autoplay=1";
  } else {
    load(i);
  }
}

function next(){
  load((i+1)%songs.length);
  playing = false;
  btn.innerText = "▶";
}

function prev(){
  load((i-1+songs.length)%songs.length);
  playing = false;
  btn.innerText = "▶";
}

</script>

</body>
</html>
