<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pixel Glow Sapphire Club</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow-x:hidden;
  font-family:'Montserrat',sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px 0 40px;
  transition:1s;
  position:relative;

  background:
  radial-gradient(circle at top,#ffe4cf 0%,#ffcfae 35%,#8d654f 100%);
}

/* RGB OUTER BORDER */

.rgb-border{
  position:fixed;
  inset:0;
  padding:3px;
  background:linear-gradient(
  90deg,
  #ff0000,
  #ff9900,
  #ffee00,
  #00ff66,
  #00ffff,
  #0066ff,
  #aa00ff,
  #ff0000
  );
  background-size:400% 400%;
  animation:rgbMove 10s linear infinite;
  z-index:-2;
}

.rgb-border::before{
  content:"";
  position:absolute;
  inset:3px;
  border-radius:0;
  background:inherit;
  z-index:-1;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  100%{background-position:400% 50%;}
}

/* DARK */

body.dark{
  background:
  radial-gradient(circle at top,#0f172a 0%,#111827 45%,#020617 100%);
  color:white;
}

/* MAIN */

.main{
  width:94%;
  max-width:320px;
  display:flex;
  flex-direction:column;
  gap:18px;
  z-index:2;
}

/* TOP LOGO */

.logo-box{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  padding:3px;
  background:linear-gradient(
  90deg,
  #22c55e,
  white,
  #22c55e
  );
  background-size:300% 300%;
  animation:rgbMove 8s linear infinite;
}

.logo-inner{
  background:rgba(255,255,255,0.78);
  border-radius:23px;
  padding:18px 12px;
  text-align:center;
  backdrop-filter:blur(10px);
  transition:1s;
}

body.dark .logo-inner{
  background:rgba(15,23,42,0.82);
}

.logo{
  font-size:28px;
  font-weight:900;
  letter-spacing:3px;
  background:linear-gradient(
  90deg,
  #22c55e,
  #3b82f6,
  #a855f7,
  #ff4d4d
  );
  background-size:300% 300%;
  animation:rgbMove 6s linear infinite;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.tagline{
  margin-top:8px;
  font-size:11px;
  letter-spacing:2px;
  font-weight:700;
  opacity:0.9;
}

/* GLASS CARD */

.card{
  background:rgba(255,255,255,0.72);
  border:2px solid rgba(255,255,255,0.4);
  backdrop-filter:blur(10px);
  border-radius:28px;
  padding:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.15);
  transition:1s;
}

body.dark .card{
  background:rgba(15,23,42,0.78);
  border:2px solid #334155;
}

/* OWNER */

.owner{
  text-align:center;
}

.owner-img{
  width:100px;
  height:100px;
  border-radius:22px;
  object-fit:cover;
  border:3px solid rgba(255,255,255,0.5);
}

.owner-name{
  margin-top:10px;
  font-size:24px;
  font-weight:900;
  background:linear-gradient(
  90deg,
  #22c55e,
  #3b82f6,
  #a855f7
  );
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.quote{
  margin-top:8px;
  font-size:11px;
  opacity:0.8;
}

/* SCREEN */

.screen{
  width:100%;
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.25);
  background:black;
}

.screen img,
.screen iframe{
  width:100%;
  height:100%;
  object-fit:cover;
  border:none;
}

/* PLAYER */

.player-top{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

.live{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 12px #22c55e;
  animation:pulse 1.2s infinite;
}

@keyframes pulse{
  50%{opacity:0.4;}
}

.song{
  font-size:11px;
  white-space:nowrap;
  overflow:hidden;
}

.song span{
  display:inline-block;
  padding-left:100%;
  animation:scroll 8s linear infinite;
}

@keyframes scroll{
  100%{
    transform:translateX(-100%);
  }
}

/* CONTROLS */

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.controls button{
  width:34px;
  height:30px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  font-size:13px;
  cursor:pointer;
}

/* CALENDAR */

.header{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
}

.days,
.dates{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}

.days div{
  text-align:center;
  font-size:10px;
  font-weight:800;
}

.dates div{
  height:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:10px;
  font-size:11px;
  background:#fffaf5;
  font-weight:700;
}

body.dark .dates div{
  background:#1e293b;
}

.today{
  background:#22c55e !important;
  color:#08120d;
}

/* NAV */

.nav{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.nav a{
  text-decoration:none;
  text-align:center;
  padding:12px;
  border-radius:14px;
  font-size:12px;
  font-weight:800;
  background:linear-gradient(
  90deg,
  #22c55e,
  #3b82f6
  );
  color:white;
}

/* PARTNERS */

.section-title{
  text-align:center;
  font-size:18px;
  font-weight:900;
  margin-bottom:14px;
}

.partner{
  background:rgba(255,255,255,0.12);
  border-radius:18px;
  padding:12px;
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.3s;
}

.partner:hover{
  transform:scale(1.03);
}

.partner img{
  width:60px;
  height:60px;
  border-radius:14px;
  object-fit:cover;
}

.partner-name{
  font-size:13px;
  font-weight:800;
}

/* GAME */

#game{
  width:100%;
  height:250px;
  border-radius:22px;
  background:
  radial-gradient(circle,#1e293b,#0f172a);
}

/* FOOTER */

.footer{
  text-align:center;
  font-size:22px;
  font-weight:900;
  padding:8px 0;
  background:linear-gradient(
  90deg,
  #ff4d4d,
  #ffcc00,
  #22c55e,
  #3b82f6,
  #a855f7
  );
  background-size:300% 300%;
  animation:rgbMove 6s linear infinite;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<div class="rgb-border"></div>

<div class="main">

  <!-- LOGO -->
  <div class="logo-box">
    <div class="logo-inner">
      <div class="logo">PIXEL GLOW</div>
      <div class="tagline">♛ WELCOME TO SAPPHIRE CLUB ♛</div>
    </div>
  </div>

  <!-- OWNER -->
  <div class="card owner">

    <img
    class="owner-img"
    src="https://images.chesscomfiles.com/uploads/v1/images_users/tiny_mce/yogi136/php8h3mmr9lb0qd8ZyClyS.png">

    <div class="owner-name">√𝓎𝓸𝓰𝓲136</div>

    <div class="quote">
      “Think like a King. Play like a Master.”
    </div>

  </div>

  <!-- CAT -->
  <div class="card">
    <div class="screen">
      <img id="themeImage" src="">
    </div>
  </div>

  <!-- PLAYER -->
  <div class="card">

    <div class="player-top">
      <div class="live"></div>

      <div class="song">
        <span id="songText">Now Playing</span>
      </div>
    </div>

    <div class="screen">
      <iframe
      id="playerFrame"
      allow="autoplay; fullscreen">
      </iframe>
    </div>

    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button onclick="playVideo()">▶</button>
      <button onclick="pauseVideo()">❚❚</button>
      <button onclick="nextSong()">⏭</button>
    </div>

  </div>

  <!-- GAME -->
  <canvas id="game"></canvas>

  <!-- CALENDAR -->
  <div class="card">

    <div class="header" id="monthYear"></div>

    <div class="days">
      <div>SUN</div>
      <div>MON</div>
      <div>TUE</div>
      <div>WED</div>
      <div>THU</div>
      <div>FRI</div>
      <div>SAT</div>
    </div>

    <div class="dates" id="dates"></div>

  </div>

  <!-- NAV -->
  <div class="card">

    <div class="nav">
      <a href="#">RULES</a>
      <a href="#">EVENTS</a>
      <a href="#">MEMBERS</a>
      <a href="#">CLICK HERE</a>
    </div>

  </div>

  <!-- PARTNERS -->
  <div class="card">

    <div class="section-title">◆ PARTNERS ◆</div>

    <div id="partnersContainer"></div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    Made by yogi136
  </div>

</div>

<script>

/* DAY NIGHT CAT */

const dayCat =
"https://i.ibb.co/qFhrggbt/image.png";

const nightCat =
"https://i.ibb.co/Zz89JYQ2";

/* DAY NIGHT */

function updateTheme(){

  const hour = new Date().getHours();

  const img =
  document.getElementById("themeImage");

  if(hour >= 6 && hour < 18){

    document.body.classList.remove("dark");

    img.src = dayCat;

  }else{

    document.body.classList.add("dark");

    img.src = nightCat;

  }

}

updateTheme();

setInterval(updateTheme,60000);

/* SONGS */

let songs = [

{
src:"https://youtu.be/kcsGhOmULxQ",
name:"Golden Brown - The Stranglers"
},

{
src:"https://youtu.be/qdpXxGPqW-Y",
name:"Faded - Alan Walker"
},

{
src:"https://youtu.be/R5aurUlfn3w",
name:"Monody - TheFatRat"
},

{
src:"https://youtu.be/Jkj36B1YuDU",
name:"Another Love - Tom Odell"
},

{
src:"https://youtu.be/rfTgO9rpqck",
name:"Heat Waves - Glass Animals"
}

];

let songIndex = 0;

const frame =
document.getElementById("playerFrame");

const songText =
document.getElementById("songText");

function convert(url){

  let id =
  url.split("youtu.be/")[1].split("?")[0];

  return
  "https://www.youtube.com/embed/" +
  id +
  "?enablejsapi=1";

}

function loadVideo(i){

  const id =
  songs[i].src.split("youtu.be/")[1];

  frame.src =
  "https://www.youtube.com/embed/" +
  id +
  "?enablejsapi=1";

  songText.innerText =
  "Now Playing : " + songs[i].name;

}

function prevSong(){

  songIndex--;

  if(songIndex < 0){

    songIndex = songs.length - 1;

  }

  loadVideo(songIndex);

}

function nextSong(){

  songIndex++;

  if(songIndex >= songs.length){

    songIndex = 0;

  }

  loadVideo(songIndex);

}

function playVideo(){

  frame.contentWindow.postMessage(
  '{"event":"command","func":"playVideo","args":""}',
  "*"
  );

}

function pauseVideo(){

  frame.contentWindow.postMessage(
  '{"event":"command","func":"pauseVideo","args":""}',
  "*"
  );

}

loadVideo(songIndex);

/* CALENDAR */

const monthYear =
document.getElementById("monthYear");

const dates =
document.getElementById("dates");

const now = new Date();

const year = now.getFullYear();

const month = now.getMonth();

const today = now.getDate();

const months = [
"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"
];

monthYear.innerText =
`${months[month]} ${year}`;

const firstDay =
new Date(year,month,1).getDay();

const lastDate =
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

  dates.innerHTML += `<div></div>`;

}

for(let i=1;i<=lastDate;i++){

  dates.innerHTML +=
  `<div class="${i===today?'today':''}">
  ${i}
  </div>`;

}

/* PARTNERS */

const partners = [

{
name:"SAPPHIRE",
img:"https://i.ibb.co/4RYLGQ3z/image.jpg",
link:"https://www.chess.com/club/sapphire-1"
},

{
name:"PENGUIN CHESS CLUB",
img:"https://i.ibb.co/0p7z5V4R/your-image.jpg",
link:"https://www.chess.com/club/penguin-chess-club-3"
}

];

const container =
document.getElementById("partnersContainer");

partners.forEach(p=>{

  const card =
  document.createElement("div");

  card.className = "partner";

  card.innerHTML = `
  <img src="${p.img}">
  <div class="partner-name">${p.name}</div>
  `;

  card.onclick = ()=>{

    window.open(p.link,"_blank");

  };

  container.appendChild(card);

});

/* GAME */

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

canvas.width = 300;
canvas.height = 250;

let bubbles = [];
let pops = [];
let score = 0;

function spawnBubble(){

  bubbles.push({

    x:Math.random()*280+10,
    y:260,
    r:Math.random()*10+8,
    speed:Math.random()*1+0.5

  });

}

function createPop(x,y){

  for(let i=0;i<8;i++){

    pops.push({

      x:x,
      y:y,
      dx:(Math.random()-0.5)*3,
      dy:(Math.random()-0.5)*3,
      life:20

    });

  }

}

function tap(e){

  const rect =
  canvas.getBoundingClientRect();

  const x =
  (e.touches ?
  e.touches[0].clientX :
  e.clientX) - rect.left;

  const y =
  (e.touches ?
  e.touches[0].clientY :
  e.clientY) - rect.top;

  bubbles = bubbles.filter(b=>{

    const d =
    Math.hypot(b.x-x,b.y-y);

    if(d < b.r){

      createPop(b.x,b.y);

      score++;

      return false;

    }

    return true;

  });

}

canvas.addEventListener("mousedown",tap);
canvas.addEventListener("touchstart",tap);

let frameCount = 0;

function loop(){

  ctx.clearRect(0,0,300,250);

  if(frameCount % 25 === 0){

    spawnBubble();

  }

  bubbles.forEach(b=>{

    b.y -= b.speed;

    ctx.beginPath();

    ctx.arc(
    b.x,
    b.y,
    b.r,
    0,
    Math.PI*2
    );

    ctx.fillStyle="#22c55e";

    ctx.fill();

  });

  bubbles =
  bubbles.filter(b=>b.y > -20);

  pops.forEach(p=>{

    p.x += p.dx;
    p.y += p.dy;
    p.life--;

    ctx.fillStyle="white";

    ctx.fillRect(p.x,p.y,2,2);

  });

  pops =
  pops.filter(p=>p.life > 0);

  ctx.fillStyle="white";
  ctx.font="bold 14px Arial";

  ctx.fillText(
  "Pops : " + score,
  10,
  20
  );

  frameCount++;

  requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
